// ============================================================
// CHART HELPERS (same as main portal)
// ============================================================
function niceMax(val){ if(val===0)return 10; const mag=Math.pow(10,Math.floor(Math.log10(val))),norm=val/mag; return (norm<=1?1:norm<=2?2:norm<=5?5:10)*mag; }
function yTicks(max,count=4){ const step=max/count; return Array.from({length:count+1},(_,i)=>i*step); }
function fmtY(v,isCurrency){ if(!isCurrency)return v>=1000?(v/1000).toFixed(1)+"k":String(Math.round(v)); if(v===0)return"0"; if(v>=1000)return"R$"+(v/1000).toFixed(v>=10000?0:1)+"k"; return"R$"+Math.round(v); }

function BarChartSVG({data,valueKey,labelKey,isCurrency=false,secondKey,secondLabel}){
  const [tt,setTt]=React.useState(null);
  if(!data||data.length===0)return<div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${T.g100}`}}><p style={{fontFamily:T.sans,fontSize:12,color:"#bbb",letterSpacing:"0.1em"}}>SEM DADOS NO PERIODO</p></div>;
  const PAD={top:12,right:12,bottom:36,left:52},VW=700,VH=220,CW=VW-PAD.left-PAD.right,CH=VH-PAD.top-PAD.bottom;
  const rawMax=Math.max(...data.map(d=>(d[valueKey]||0)+(secondKey?(d[secondKey]||0):0)),1);
  const maxV=niceMax(rawMax),ticks=yTicks(maxV,4);
  const barSlot=CW/data.length,barPad=Math.max(barSlot*0.2,2),bw=barSlot-barPad*2;
  const every=Math.max(1,Math.ceil(data.length/Math.floor(CW/48)));
  const yOf=v=>CH-(v/maxV)*CH;
  return(
    <div style={{position:"relative",userSelect:"none"}}>
      <svg width="100%" viewBox={`0 0 ${VW} ${VH}`} style={{display:"block",overflow:"visible"}}>
        <g transform={`translate(${PAD.left},${PAD.top})`}>
          {ticks.map(t=><g key={t}><line x1={0} y1={yOf(t)} x2={CW} y2={yOf(t)} stroke={t===0?"#ddd":"#f2f2f2"} strokeWidth="1"/><text x={-8} y={yOf(t)+4} textAnchor="end" fontSize="11" fill="#bbb" fontFamily="sans-serif">{fmtY(t,isCurrency)}</text></g>)}
          {data.map((d,i)=>{
            const v1=d[valueKey]||0,v2=secondKey?(d[secondKey]||0):0;
            const x0=i*barSlot+barPad,bw1=secondKey?bw/2-1:bw;
            const h1=Math.max((v1/maxV)*CH,v1>0?1:0),h2=Math.max((v2/maxV)*CH,v2>0?1:0);
            const lastS=Math.floor((data.length-1)/every)*every,tooClose=(data.length-1-lastS)<Math.ceil(every*0.5);
            const showLbl=(i%every===0)||(i===data.length-1&&!tooClose);
            return(<g key={i} onMouseEnter={()=>setTt({i,x:x0+bw/2,v1,v2,label:d[labelKey]})} onMouseLeave={()=>setTt(null)}>
              <rect x={x0} y={yOf(v1)} width={bw1} height={h1} fill="#111" opacity={tt&&tt.i===i?1:0.85}/>
              {secondKey&&<rect x={x0+bw/2+1} y={yOf(v2)} width={bw1} height={h2} fill="#ccc" opacity={tt&&tt.i===i?1:0.85}/>}
              {showLbl&&<text x={x0+bw/2} y={CH+24} textAnchor="middle" fontSize="10" fill="#bbb" fontFamily="sans-serif">{d[labelKey]}</text>}
            </g>);
          })}
          <line x1={0} y1={CH} x2={CW} y2={CH} stroke="#e0e0e0" strokeWidth="1"/>
        </g>
      </svg>
      {tt&&<div style={{position:"absolute",top:8,left:`${(PAD.left+tt.x)/VW*100}%`,transform:"translateX(-50%)",background:"#111",color:"#fff",fontFamily:T.sans,fontSize:11,padding:"8px 12px",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10,lineHeight:1.7}}>
        <div style={{color:"#888",fontSize:10,marginBottom:2}}>{tt.label}</div>
        <div>{isCurrency?"R$ "+tt.v1.toLocaleString("pt-BR",{minimumFractionDigits:2}):tt.v1}</div>
        {secondKey&&<div style={{color:"#ccc"}}>{secondLabel}: {isCurrency?"R$ "+tt.v2.toLocaleString("pt-BR",{minimumFractionDigits:2}):tt.v2}</div>}
      </div>}
    </div>
  );
}

function ComboChartSVG({data,barKey,barLabel,lineKey,lineLabel,labelKey}){
  const [tt,setTt]=React.useState(null);
  if(!data||data.length===0)return<div style={{height:200,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${T.g100}`}}><p style={{fontFamily:T.sans,fontSize:12,color:"#bbb",letterSpacing:"0.1em"}}>SEM DADOS NO PERIODO</p></div>;
  const PAD={top:12,right:12,bottom:36,left:52},VW=700,VH=220,CW=VW-PAD.left-PAD.right,CH=VH-PAD.top-PAD.bottom;
  const rawMax=Math.max(...data.map(d=>Math.max(d[barKey]||0,d[lineKey]||0)),1);
  const maxV=niceMax(rawMax),ticks=yTicks(maxV,4),yOf=v=>CH-(v/maxV)*CH;
  const barSlot=CW/data.length,barPad=Math.max(barSlot*0.22,2),bw=barSlot-barPad*2;
  const xC=i=>i*barSlot+barSlot/2;
  const pathD=data.map((d,i)=>`${i===0?"M":"L"}${xC(i)},${yOf(d[lineKey]||0)}`).join(" ");
  const areaD=pathD+` L${xC(data.length-1)},${CH} L${xC(0)},${CH} Z`;
  const every=Math.max(1,Math.ceil(data.length/Math.floor(CW/48)));
  return(
    <div style={{position:"relative",userSelect:"none"}}>
      <div style={{display:"flex",gap:20,marginBottom:10,paddingLeft:52}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:10,height:10,background:"#111",display:"inline-block"}}/><span style={{fontFamily:T.sans,fontSize:10,color:"#999"}}>{barLabel}</span></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:18,height:2,background:"#bbb",display:"inline-block"}}/><span style={{fontFamily:T.sans,fontSize:10,color:"#999"}}>{lineLabel}</span></div>
      </div>
      <svg width="100%" viewBox={`0 0 ${VW} ${VH}`} style={{display:"block",overflow:"visible"}}
        onMouseMove={e=>{const r=e.currentTarget.getBoundingClientRect(),mx=(e.clientX-r.left)/r.width*VW-PAD.left;setTt({i:Math.max(0,Math.min(data.length-1,Math.floor(mx/barSlot)))});}}
        onMouseLeave={()=>setTt(null)}>
        <g transform={`translate(${PAD.left},${PAD.top})`}>
          {ticks.map(t=><g key={t}><line x1={0} y1={yOf(t)} x2={CW} y2={yOf(t)} stroke={t===0?"#ddd":"#f2f2f2"} strokeWidth="1"/><text x={-8} y={yOf(t)+4} textAnchor="end" fontSize="11" fill="#bbb" fontFamily="sans-serif">{fmtY(t,false)}</text></g>)}
          {data.map((d,i)=>{ const v=d[barKey]||0,h=Math.max((v/maxV)*CH,v>0?1:0),x0=i*barSlot+barPad; return<rect key={i} x={x0} y={yOf(v)} width={bw} height={h} fill="#111" opacity={tt&&tt.i===i?1:0.8}/>; })}
          <path d={areaD} fill="#aaa" opacity="0.08"/>
          <path d={pathD} fill="none" stroke="#aaa" strokeWidth="2" strokeLinejoin="round"/>
          {tt&&<><line x1={xC(tt.i)} y1={0} x2={xC(tt.i)} y2={CH} stroke="#eee" strokeWidth="1" strokeDasharray="3,3"/><circle cx={xC(tt.i)} cy={yOf(data[tt.i][lineKey]||0)} r="4" fill="#aaa" stroke="#fff" strokeWidth="2"/><circle cx={xC(tt.i)} cy={yOf(data[tt.i][barKey]||0)} r="4" fill="#111" stroke="#fff" strokeWidth="2"/></>}
          {data.map((d,i)=>{ const lS=Math.floor((data.length-1)/every)*every,tC=(data.length-1-lS)<Math.ceil(every*0.5),show=(i%every===0)||(i===data.length-1&&!tC); if(!show)return null; return<text key={"xl"+i} x={xC(i)} y={CH+24} textAnchor="middle" fontSize="10" fill="#bbb" fontFamily="sans-serif">{d[labelKey]}</text>; })}
          <line x1={0} y1={CH} x2={CW} y2={CH} stroke="#e0e0e0" strokeWidth="1"/>
        </g>
      </svg>
      {tt&&<div style={{position:"absolute",top:8,left:`${(PAD.left+xC(tt.i))/VW*100}%`,transform:"translateX(-50%)",background:"#111",color:"#fff",fontFamily:T.sans,fontSize:11,padding:"8px 12px",pointerEvents:"none",whiteSpace:"nowrap",zIndex:10,lineHeight:1.7}}>
        <div style={{color:"#888",fontSize:10,marginBottom:2}}>{data[tt.i][labelKey]}</div>
        <div>{barLabel}: <strong>{data[tt.i][barKey]||0}</strong></div>
        <div style={{color:"#ccc"}}>{lineLabel}: <strong>{data[tt.i][lineKey]||0}</strong></div>
      </div>}
    </div>
  );
}


// ============================================================
// PAGE LOGIN
// ============================================================
function PageLogin({onLogin}){
  const [email,setEmail]=React.useState("");
  const [senha,setSenha]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState("");
  const [modo,setModo]=React.useState("login"); // login | recuperar
  const [enviado,setEnviado]=React.useState(false);
  const [loadingRec,setLoadingRec]=React.useState(false);

  async function entrar(){
    setLoading(true); setErr("");
    const {data,error}=await supabase.auth.signInWithPassword({email,password:senha});
    if(error){setErr("E-mail ou senha incorretos.");setLoading(false);return;}
    onLogin(data.user);
  }

  async function recuperar(){
    setLoadingRec(true);
    await supabase.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+window.location.pathname});
    setEnviado(true); setLoadingRec(false);
  }

  return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <Header/>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{width:"100%",maxWidth:360}}>
          {modo==="login"?(
            <>
              <h1 style={{fontFamily:T.serif,fontSize:36,fontWeight:300,marginBottom:8}}>Entrar</h1>
              <p style={{fontFamily:T.sans,fontSize:12,color:T.g400,marginBottom:40}}>Portal Embaixadoras SG</p>
              <div style={{display:"flex",flexDirection:"column",gap:24}}>
                <Input label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
                <Input label="Senha" type="password" value={senha} onChange={e=>setSenha(e.target.value)}/>
              </div>
              {err&&<div style={{marginTop:16}}><Alert msg={err} ok={false}/></div>}
              <div style={{marginTop:32}}><BtnPrimary onClick={entrar} loading={loading}>Entrar</BtnPrimary></div>
              <button onClick={()=>setModo("recuperar")} style={{fontFamily:T.sans,fontSize:11,color:T.g400,background:"none",border:"none",cursor:"pointer",marginTop:20,textDecoration:"underline"}}>Esqueci minha senha</button>
            </>
          ):(
            <>
              <h1 style={{fontFamily:T.serif,fontSize:36,fontWeight:300,marginBottom:8}}>Recuperar senha</h1>
              {enviado
                ? <Alert msg="Enviamos um link para o seu e-mail. Verifique a caixa de entrada." ok={true}/>
                : (<>
                  <p style={{fontFamily:T.sans,fontSize:12,color:T.g400,marginBottom:32}}>Digite seu e-mail para receber o link de recuperacao.</p>
                  <Input label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
                  <div style={{marginTop:24}}><BtnPrimary onClick={recuperar} loading={loadingRec}>Enviar link</BtnPrimary></div>
                </>)
              }
              <button onClick={()=>setModo("login")} style={{fontFamily:T.sans,fontSize:11,color:T.g400,background:"none",border:"none",cursor:"pointer",marginTop:20,textDecoration:"underline"}}>Voltar ao login</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

  const [sync,setSync]=React.useState(false);
  const [fResgate,setFResgate]=React.useState({tipo:"pix"});
  const [solicitando,setSolicitando]=React.useState(false);
  const [msgRes,setMsgRes]=React.useState({text:"",ok:false});
  const [editando,setEditando]=React.useState(false);
  const [fEdit,setFEdit]=React.useState({});
  const [savingEdit,setSavingEdit]=React.useState(false);

  React.useEffect(()=>{load();},[]);

  async function load(){
    setLoading(true);
    const {data:e}=await supabase.from("embaixadores_sg").select("*").eq("email",user.email).maybeSingle();
    if(e){ setEmb(e);
      const {data:c}=await supabase.from("comissoes_sg").select("*").eq("embaixador_sg_id",e.id).order("criado_em",{ascending:false});
      setComs(c||[]);
      const {data:r}=await supabase.from("resgates_sg").select("*").eq("embaixador_sg_id",e.id).order("criado_em",{ascending:false});
      setResgates(r||[]);
    }
    const {data:b}=await supabase.from("config").select("valor").eq("chave","banner_sg_ativo").maybeSingle();
    if(b?.valor) setBanner(b.valor);
    const {data:bc}=await supabase.from("config").select("valor").eq("chave","banner_sg_caption").maybeSingle();
    if(bc?.valor) setBannerCaption(bc.valor);
    const {data:ba}=await supabase.from("config").select("valor").eq("chave","banner_sg_altura").maybeSingle();
    if(ba?.valor) setBannerAltura(Number(ba.valor));
    setLoading(false);
  }

  async function sincronizar(){
    if(!emb) return; setSync(true);
    const pedidos=await NS.ordersByCoupon(emb.cupom);
    let novos=0;
    for(const p of (pedidos||[])){
      if(!p.coupon) continue;
      const match=(p.coupon||[]).find(c=>(c.code||"").toUpperCase()===(emb.cupom||"").toUpperCase());
      if(!match) continue;
      const {data:existe}=await supabase.from("comissoes_sg").select("id").eq("pedido_id",String(p.id)).eq("embaixador_sg_id",emb.id).maybeSingle();
      if(existe) continue;
      const val=parseFloat(p.total)||0;
      const status=p.payment_status==="paid"||p.payment_status==="authorized"?"confirmada":"pendente";
      await supabase.from("comissoes_sg").insert({embaixador_sg_id:emb.id,pedido_id:String(p.id),valor_pedido:val,valor_comissao:val*CONFIG.COMISSAO_PCT,status,payment_status:p.payment_status,resgatada:false,criado_em:p.created_at});
      novos++;
    }
    await load(); setSync(false);
  }

  async function salvarPerfil(){
    setSavingEdit(true);
    await supabase.from("embaixadores_sg").update({whatsapp:fEdit.whatsapp,instagram:fEdit.instagram,pix_key:fEdit.pix_key}).eq("id",emb.id);
    setSavingEdit(false); setEditando(false); await load();
  }

  if(loading) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout}/><Spinner/></div>;
  if(!emb) return(
    <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout}/>
      <div style={{padding:48}}><Alert msg="Conta nao encontrada no programa Embaixadoras SG. Entre em contato com a equipe Saint Germain." ok={false}/></div>
    </div>
  );

  const saldoPago=coms.filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+(c.valor_comissao||0),0);
  const totalGanho=coms.filter(c=>c.status==="confirmada").reduce((s,c)=>s+(c.valor_comissao||0),0);
  const hoje=new Date().getDate();
  const podeSolicitar=saldoPago>=100&&hoje<=10&&emb.pix_key;

  async function solicitar(){
    if(!podeSolicitar) return;
    setSolicitando(true); setMsgRes({text:"",ok:false});
    await supabase.from("resgates_sg").insert({embaixador_sg_id:emb.id,valor:saldoPago,tipo:"pix",pix_key:emb.pix_key,status:"solicitado",criado_em:new Date().toISOString()});
    const ids=coms.filter(c=>c.status==="confirmada"&&!c.resgatada).map(c=>c.id);
    if(ids.length) await supabase.from("comissoes_sg").update({resgatada:true}).in("id",ids);
    setMsgRes({text:"Resgate solicitado com sucesso! Pagamento ate o dia 20.",ok:true});
    setSolicitando(false); await load();
  }

  return(
    <div style={{minHeight:"100vh"}}>
      <Header user={user} onLogout={onLogout}/>
      {banner&&(
        <div style={{overflow:"hidden"}}>
          <img src={banner} alt="Promocao" style={{width:"100%",maxHeight:bannerAltura,objectFit:"cover",display:"block"}}/>
          {bannerCaption&&<div style={{padding:"12px 16px",background:"#f9f9f9",borderTop:`1px solid ${T.g200}`}}><p style={{fontFamily:T.sans,fontSize:12,color:T.g500,lineHeight:1.7}}>{bannerCaption}</p></div>}
        </div>
      )}
      <div style={{maxWidth:800,margin:"0 auto",padding:"40px 24px"}}>
        <div style={{marginBottom:40}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:4}}>Ola, {emb.nome.split(" ")[0]}</p>
          <h2 style={{fontFamily:T.serif,fontSize:36,fontWeight:300}}>Embaixadora Saint Germain</h2>
          <p style={{fontFamily:T.sans,fontSize:12,color:T.g400,marginTop:4}}>Cupom: <strong style={{color:T.black,letterSpacing:"0.12em"}}>{emb.cupom}</strong></p>
        </div>

        <StatGrid items={[[brl(saldoPago),"Disponivel para resgate"],[brl(totalGanho),"Total ganho"],[coms.filter(c=>c.status==="confirmada").length,"Pedidos confirmados"],[coms.length,"Total de pedidos"]]} cols={4}/>

        {/* Resgate */}
        <div style={{marginBottom:48,padding:24,border:`1px solid ${T.g200}`}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:16}}>Solicitar resgate</p>
          {!emb.pix_key&&<Alert msg="Cadastre sua chave Pix no perfil para solicitar resgate." ok={false}/>}
          {emb.pix_key&&saldoPago<100&&<p style={{fontFamily:T.sans,fontSize:13,color:T.g400,lineHeight:1.7}}>Saldo minimo para resgate: <strong>R$ 100,00</strong>. Seu saldo atual e {brl(saldoPago)}. Continue vendendo!</p>}
          {emb.pix_key&&saldoPago>=100&&hoje>10&&<p style={{fontFamily:T.sans,fontSize:13,color:T.g400,lineHeight:1.7}}>Periodo de solicitacao encerrado. Proxima janela: ate o dia 10 do mes que vem.</p>}
          {podeSolicitar&&(
            <div>
              <p style={{fontFamily:T.sans,fontSize:13,lineHeight:1.7,marginBottom:16}}>Valor disponivel: <strong style={{fontFamily:T.serif,fontSize:20}}>{brl(saldoPago)}</strong></p>
              <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginBottom:20}}>Pix: {emb.pix_key} &mdash; Pagamento ate o dia 20.</p>
              <BtnPrimary onClick={solicitar} loading={solicitando} style={{width:"auto",padding:"12px 32px"}}>Solicitar resgate</BtnPrimary>
            </div>
          )}
          {msgRes.text&&<div style={{marginTop:16}}><Alert msg={msgRes.text} ok={msgRes.ok}/></div>}
        </div>

        {/* Historico comissoes */}
        <div style={{marginBottom:48}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase"}}>Historico de vendas</p>
            <button onClick={sincronizar} disabled={sync} style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",background:"none",border:`1px solid ${T.g200}`,padding:"8px 14px",cursor:"pointer",color:T.g500}}>
              {sync?"Sincronizando...":"Sincronizar"}
            </button>
          </div>
          {coms.length===0
            ? <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Nenhuma venda registrada ainda.</p>
            : <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontFamily:T.sans}}>
              <thead><tr style={{borderBottom:`2px solid ${T.black}`}}>
                {["Data","Pedido","Valor","Comissao","Status"].map(h=><th key={h} style={{fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",color:T.g400,fontWeight:400,padding:"8px 12px",textAlign:"left"}}>{h}</th>)}
              </tr></thead>
              <tbody>{coms.map((c,i)=>(
                <tr key={c.id} style={{borderBottom:`1px solid ${T.g100}`,background:i%2===0?"transparent":"#fafafa"}}>
                  <td style={{padding:"10px 12px",fontSize:12,color:T.g500}}>{fmt(c.criado_em)}</td>
                  <td style={{padding:"10px 12px",fontSize:12,color:T.g500}}>#{c.pedido_id}</td>
                  <td style={{padding:"10px 12px",fontSize:13}}>{brl(c.valor_pedido)}</td>
                  <td style={{padding:"10px 12px",fontFamily:T.serif,fontSize:16,fontWeight:300,color:"#2a9d5c"}}>{brl(c.valor_comissao)}</td>
                  <td style={{padding:"10px 12px"}}><Badge text={c.status} color={c.status==="confirmada"?"#2a9d5c":T.g400}/></td>
                </tr>
              ))}</tbody>
            </table></div>
          }
        </div>

        {/* Resgates solicitados */}
        {resgates.length>0&&(
          <div style={{marginBottom:48}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:16}}>Resgates solicitados</p>
            {resgates.map(r=>(
              <div key={r.id} style={{display:"flex",justifyContent:"space-between",padding:"12px 0",borderBottom:`1px solid ${T.g100}`}}>
                <div><p style={{fontFamily:T.sans,fontSize:12,color:T.g500}}>{fmt(r.criado_em)}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>Pix: {r.pix_key}</p></div>
                <div style={{textAlign:"right"}}><p style={{fontFamily:T.serif,fontSize:20,fontWeight:300,marginBottom:4}}>{brl(r.valor)}</p><Badge text={{solicitado:"Solicitado",aprovado:"Aprovado",pago:"Pago",recusado:"Recusado"}[r.status]||r.status} color={{solicitado:T.g400,aprovado:"#000",pago:"#2a9d5c",recusado:"#c00"}[r.status]}/></div>
              </div>
            ))}
          </div>
        )}

        {/* Perfil */}
        <div style={{borderTop:`1px solid ${T.g200}`,paddingTop:40}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase"}}>Meu perfil</p>
            {!editando&&<button onClick={()=>{setFEdit({whatsapp:emb.whatsapp||"",instagram:emb.instagram||"",pix_key:emb.pix_key||""});setEditando(true);}} style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",background:"none",border:`1px solid ${T.g200}`,padding:"8px 14px",cursor:"pointer"}}>Editar</button>}
          </div>
          {editando?(
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <Input label="WhatsApp" value={fEdit.whatsapp} onChange={e=>setFEdit(p=>({...p,whatsapp:e.target.value}))}/>
              <Input label="Instagram" value={fEdit.instagram} onChange={e=>setFEdit(p=>({...p,instagram:e.target.value}))}/>
              <Input label="Chave Pix" value={fEdit.pix_key} onChange={e=>setFEdit(p=>({...p,pix_key:e.target.value}))}/>
              <div style={{display:"flex",gap:12}}>
                <BtnPrimary onClick={salvarPerfil} loading={savingEdit} style={{width:"auto",padding:"12px 28px"}}>Salvar</BtnPrimary>
                <BtnSecondary onClick={()=>setEditando(false)}>Cancelar</BtnSecondary>
              </div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              {[["Nome",emb.nome],["E-mail",emb.email],["WhatsApp",emb.whatsapp||"-"],["Instagram",emb.instagram||"-"],["Cupom",emb.cupom],["Chave Pix",emb.pix_key||<span style={{color:"#c00"}}>Nao cadastrada</span>]].map(([l,v])=>(
                <div key={l} style={{display:"flex",gap:16,padding:"8px 0",borderBottom:`1px solid ${T.g100}`}}>
                  <span style={{fontFamily:T.sans,fontSize:11,color:T.g400,width:100,flexShrink:0,letterSpacing:"0.08em",textTransform:"uppercase"}}>{l}</span>
                  <span style={{fontFamily:T.sans,fontSize:13}}>{v}</span>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function PageAdmin({user,onLogout}){
  const [tab,setTab]=React.useState("dashboard");
  const [embs,setEmbs]=React.useState([]);
  const [ress,setRess]=React.useState([]);
  const [todosResgates,setTodosResgates]=React.useState([]);
  const [fila,setFila]=React.useState([]);
  const [unread,setUnread]=React.useState(0);
  const [loading,setLoading]=React.useState(true);
  const [busca,setBusca]=React.useState("");
  const [ordemEmb,setOrdemEmb]=React.useState("data");
  const [editEmb,setEditEmb]=React.useState(null);
  const [editForm,setEditForm]=React.useState({});
  const [msgEdit,setMsgEdit]=React.useState({text:"",ok:false});
  const [savingEdit,setSavingEdit]=React.useState(false);
  const [banner,setBanner]=React.useState("");
  const [bannerPreview,setBannerPreview]=React.useState(null);
  const [bannerCaption,setBannerCaption]=React.useState("");
  const [uploadando,setUploadando]=React.useState(false);
  const [salvandoCaption,setSalvandoCaption]=React.useState(false);
  const [bannerAltura,setBannerAltura]=React.useState(200);
  const [salvandoAltura,setSalvandoAltura]=React.useState(false);
  const [msgBanner,setMsgBanner]=React.useState({text:"",ok:false});
  const [dash,setDash]=React.useState(null);
  const [dashPeriodo,setDashPeriodo]=React.useState(30);
  const [dashModo,setDashModo]=React.useState("preset");
  const [dashCustomDe,setDashCustomDe]=React.useState("");
  const [dashCustomAte,setDashCustomAte]=React.useState("");
  // CSV import
  const [csvLinhas,setCsvLinhas]=React.useState([]);
  const [csvErro,setCsvErro]=React.useState("");
  const [importando,setImportando]=React.useState(false);
  const [msgImport,setMsgImport]=React.useState({text:"",ok:false});

  const filtrados=React.useMemo(()=>{
    const base=embs.filter(e=>!busca||[e.nome,e.email,e.cupom].join(" ").toLowerCase().includes(busca.toLowerCase()));
    return [...base].sort((a,b)=>{
      if(ordemEmb==="nome")return(a.nome||"").localeCompare(b.nome||"","pt");
      if(ordemEmb==="faturamento"){const fa=(a.comissoes_sg||[]).reduce((s,c)=>s+(c.valor_comissao||0),0),fb=(b.comissoes_sg||[]).reduce((s,c)=>s+(c.valor_comissao||0),0);return fb-fa;}
      if(ordemEmb==="disponivel"){const da=(a.comissoes_sg||[]).filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+(c.valor_comissao||0),0),db=(b.comissoes_sg||[]).filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+(c.valor_comissao||0),0);return db-da;}
      return new Date(b.criado_em||0)-new Date(a.criado_em||0);
    });
  },[embs,busca,ordemEmb]);

  React.useEffect(()=>{load();},[]);
  React.useEffect(()=>{
    if(dashModo==="preset")loadDashboard(dashPeriodo,null,null);
    else if(dashCustomDe&&dashCustomAte)loadDashboard(null,dashCustomDe,dashCustomAte);
  },[dashPeriodo,dashModo,dashCustomDe,dashCustomAte]);

  async function load(){
    setLoading(true);
    const {data:e}=await supabase.from("embaixadores_sg").select("*, comissoes_sg(valor_comissao,status,resgatada)").order("criado_em",{ascending:false});
    setEmbs(e||[]);
    const {data:r}=await supabase.from("resgates_sg").select("*, embaixadores_sg(nome,email,cupom,pix_key)").eq("status","solicitado").order("criado_em",{ascending:false});
    setRess(r||[]);
    const {data:tr}=await supabase.from("resgates_sg").select("*, embaixadores_sg(nome,email,cupom,pix_key)").order("criado_em",{ascending:false});
    setTodosResgates(tr||[]);
    const ontem=new Date(Date.now()-86400000).toISOString();
    const {data:novos}=await supabase.from("embaixadores_sg").select("id,nome,whatsapp,cupom,criado_em").gte("criado_em",ontem);
    const t30=new Date(Date.now()-30*86400000).toISOString();
    const {data:inat}=await supabase.from("embaixadores_sg").select("id,nome,whatsapp,cupom,ultimo_acesso").lt("ultimo_acesso",t30).eq("status","ativo");
    setFila([...(novos||[]).map(x=>({...x,motivo:"Novo cadastro - boas-vindas",p:"alta"})),...(inat||[]).map(x=>({...x,motivo:"Inativo +30d - reengajar",p:"media"}))]);
    const {data:b}=await supabase.from("config").select("valor").eq("chave","banner_sg_ativo").maybeSingle();
    if(b?.valor)setBanner(b.valor);
    const {data:bc}=await supabase.from("config").select("valor").eq("chave","banner_sg_caption").maybeSingle();
    setBannerCaption(bc?.valor||"");
    const {data:ba}=await supabase.from("config").select("valor").eq("chave","banner_sg_altura").maybeSingle();
    if(ba?.valor) setBannerAltura(Number(ba.valor));
    setLoading(false);
  }

  async function loadDashboard(dias,customDe,customAte){
    let desdeISO,ateISO;
    if(customDe&&customAte){desdeISO=customDe;ateISO=customAte;}
    else{desdeISO=daysAgoBR(dias);ateISO=daysAgoBR(0);}
    const desde=desdeISO+"T00:00:00-03:00",ate=ateISO+"T23:59:59-03:00";
    const msRange=new Date(ateISO).getTime()-new Date(desdeISO).getTime();
    const diasRange=Math.round(msRange/86400000)+1;

    const {data:coms}=await supabase.from("comissoes_sg").select("embaixador_sg_id,valor_pedido,valor_comissao,status,payment_status,criado_em").gte("criado_em",desde).lte("criado_em",ate).order("criado_em",{ascending:true});
    const {data:todosEmbs}=await supabase.from("embaixadores_sg").select("id,nome,status,criado_em");
    const {data:resgAll}=await supabase.from("resgates_sg").select("valor,status,criado_em").order("criado_em",{ascending:true});

    const fatD={},cadD={};
    for(let d=0;d<diasRange;d++){const dt=new Date(new Date(desdeISO).getTime()+d*86400000),key=dt.toISOString().slice(0,10);fatD[key]={f:0,c:0};cadD[key]={cadastros:0};}
    (coms||[]).forEach(c=>{const k=toBRDate(c.criado_em);if(fatD[k]){fatD[k].f+=c.valor_pedido||0;fatD[k].c+=c.valor_comissao||0;}});
    (todosEmbs||[]).filter(e=>e.criado_em>=desde&&e.criado_em<=ate).forEach(e=>{const k=toBRDate(e.criado_em);if(cadD[k])cadD[k].cadastros+=1;});

    const timeline=Object.keys(fatD).sort().map(k=>({data:keyToLabel(k),fat:Math.round(fatD[k].f*100)/100,comissao:Math.round(fatD[k].c*100)/100,cadastros:cadD[k]?.cadastros||0}));
    const pagos=(coms||[]).filter(c=>c.payment_status==="paid"||c.status==="confirmada");
    const totalFat=pagos.reduce((s,c)=>s+(c.valor_pedido||0),0);
    const totalCom=pagos.reduce((s,c)=>s+(c.valor_comissao||0),0);
    const totalPed=pagos.length;
    const ticketMedio=totalPed>0?totalFat/totalPed:0;
    const ativas=(todosEmbs||[]).filter(e=>e.status==="ativo").length;
    const comVenda=new Set(pagos.map(c=>c.embaixador_sg_id).filter(Boolean)).size;
    const cadPeriodo=(todosEmbs||[]).filter(e=>toBRDate(e.criado_em)>=desdeISO&&toBRDate(e.criado_em)<=ateISO).length;

    const rankMap={};
    pagos.forEach(c=>{if(!c.embaixador_sg_id)return;if(!rankMap[c.embaixador_sg_id])rankMap[c.embaixador_sg_id]={id:c.embaixador_sg_id,fat:0,peds:0,com:0};rankMap[c.embaixador_sg_id].fat+=c.valor_pedido||0;rankMap[c.embaixador_sg_id].peds+=1;rankMap[c.embaixador_sg_id].com+=c.valor_comissao||0;});
    const embMap={};(todosEmbs||[]).forEach(e=>embMap[e.id]=e.nome);
    const top10=Object.values(rankMap).sort((a,b)=>b.fat-a.fat).slice(0,10).map(r=>({...r,nome:(embMap[r.id]||"?").split(" ").slice(0,2).join(" ")}));

    const resgMap={};
    (resgAll||[]).forEach(r=>{const k=toBRDate(r.criado_em).slice(0,7);if(!resgMap[k])resgMap[k]={mes:keyToMonthLabel(k),valor:0,qtd:0};resgMap[k].valor+=r.valor||0;resgMap[k].qtd+=1;});
    const resgPorMes=Object.values(resgMap).sort((a,b)=>a.mes.localeCompare(b.mes)).slice(-6);

    setDash({timeline,totalFat,totalCom,totalPed,ticketMedio,ativas,comVenda,cadPeriodo,top10,resgPorMes});
  }

  async function feito(id){await supabase.from("embaixadores_sg").update({ultimo_contato:new Date().toISOString()}).eq("id",id);setFila(f=>f.filter(x=>x.id!==id));}
  async function salvarBanner(ev){
    const file=ev.target.files?.[0]; if(!file)return;
    setUploadando(true); setMsgBanner({text:"",ok:false});
    setBannerPreview(URL.createObjectURL(file));
    const ext=file.name.split(".").pop(),path=`banners-sg/banner-sg-${Date.now()}.${ext}`;
    const {error:upErr}=await supabase.storage.from("banners").upload(path,file,{upsert:true});
    if(upErr){setMsgBanner({text:"Erro no upload: "+upErr.message,ok:false});setUploadando(false);return;}
    const {data:pub}=supabase.storage.from("banners").getPublicUrl(path);
    const url=pub.publicUrl;
    await supabase.from("config").upsert({chave:"banner_sg_ativo",valor:url},{onConflict:"chave"});
    setBanner(url); setBannerPreview(null);
    setMsgBanner({text:"Banner atualizado!",ok:true});
    setUploadando(false);
  }

  async function removerBanner(){

  function parsarCSV(texto){
    const linhas=texto.trim().split("\n").map(l=>l.split(/[,;]/).map(c=>c.trim().replace(/^"|"$/g,"")));
    const header=linhas[0].map(h=>h.toLowerCase());
    const get=(row,keys)=>{for(const k of keys){const i=header.indexOf(k);if(i>=0&&row[i])return row[i];}return "";};
    return linhas.slice(1).filter(r=>r.length>1).map(row=>({
      nome:get(row,["nome","name"]),email:get(row,["email","e-mail"]),
      whatsapp:get(row,["whatsapp","telefone","phone"]),cupom:get(row,["cupom","coupon","codigo"]),
      instagram:get(row,["instagram"]),status:"ativo",
    })).filter(r=>r.nome&&r.email);
  }

  async function importarCSV(){
    setImportando(true); setMsgImport({text:"",ok:false});
    let ok=0,skip=0;
    for(const linha of csvLinhas){
      const {data:existe}=await supabase.from("embaixadores_sg").select("id").eq("email",linha.email).maybeSingle();
      if(existe){skip++;continue;}
      await supabase.from("embaixadores_sg").insert({...linha,criado_em:new Date().toISOString()});
      ok++;
    }
    setMsgImport({text:`${ok} importadas, ${skip} ignoradas (ja existiam).`,ok:true});
    setCsvLinhas([]); setImportando(false); await load();
  }

  function exportarCSV(){
    const BOM="\uFEFF",sep=";";
    const header=["Nome","E-mail","WhatsApp","Instagram","Cupom","Status","Faturamento","Disponivel"];
    const rows=filtrados.map(e=>{
      const fat=(e.comissoes_sg||[]).reduce((s,c)=>s+(c.valor_comissao||0),0).toFixed(2).replace(".",",");
      const disp=(e.comissoes_sg||[]).filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+(c.valor_comissao||0),0).toFixed(2).replace(".",",");
      return[e.nome,e.email,e.whatsapp||"",e.instagram||"",e.cupom,e.status||"",fat,disp].join(sep);
    });
    const csv=BOM+[header.join(sep),...rows].join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="embaixadoras_sg.csv";a.click();
  }

            <h2 style={{fontFamily:T.serif,fontSize:36,fontWeight:300,marginBottom:8}}>Importar Embaixadoras</h2>

              <label style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",border:`1px solid ${T.g300}`,padding:"12px 20px",cursor:"pointer",color:T.g600,display:"inline-block"}}>

            {csvLinhas.length>0&&(

                  <table style={{width:"100%",borderCollapse:"collapse",fontFamily:T.sans}}>
                    <thead><tr style={{borderBottom:`1px solid ${T.g200}`,background:T.g100}}>

        {/* TAB FILA */}
        {tab==="fila"&&(
          <div className="fade-in">
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:24}}>Envio manual via WhatsApp</p>

            :fila.map(c=>(
              <Row key={c.id}
                left={<div><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}><p style={{fontFamily:T.sans,fontSize:13}}>{c.nome}</p><Badge text={c.p==="alta"?"Novo":"Inativo"} color={c.p==="alta"?T.black:T.g400}/></div><p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{c.whatsapp}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g500,marginTop:2}}>{c.motivo}</p></div>}
                right={<div style={{display:"flex",gap:8,marginLeft:16,flexShrink:0}}>
                  <a href={`https://wa.me/55${(c.whatsapp||"").replace(/[^0-9]/g,"")}?text=Oi ${(c.nome||"").split(" ")[0]}!`} target="_blank" rel="noopener noreferrer"><BtnSecondary style={{padding:"10px 16px",fontSize:10}}>Abrir WA</BtnSecondary></a>
                  <BtnGhost onClick={()=>feito(c.id)} style={{fontSize:10}}>Feito ✓</BtnGhost>
                </div>}

        {/* TAB RANKING */}
        {tab==="ranking"&&(
          <div className="fade-in" style={{maxWidth:600}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:8}}>Top Embaixadoras</p>
            <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,lineHeight:1.7,marginBottom:32}}>Ranking por vendas confirmadas.</p>

              :(() => {

                    const fa=(a.comissoes_sg||[]).reduce((s,c)=>s+(c.valor_comissao||0),0);
                    const fb=(b.comissoes_sg||[]).reduce((s,c)=>s+(c.valor_comissao||0),0);

}

function PageChat({ embs, onUnread }) {
  const [conversas, setConversas] = React.useState([]);
  const [ativa, setAtiva] = React.useState(null);
  const [msgs, setMsgs] = React.useState([]);
  const [texto, setTexto] = React.useState("");
  const [enviando, setEnviando] = React.useState(false);
  const [loading, setLoading] = React.useState(true);
  const msgsEndRef = React.useRef(null);

  React.useEffect(function() {
    carregarConversas();
    const interval = setInterval(carregarConversas, 15000);
    return function(){ clearInterval(interval); };
  }, []);

  React.useEffect(function() {
    if(ativa) carregarMensagens(ativa.telefone);
  }, [ativa]);

  React.useEffect(function() {
    if(msgsEndRef.current) msgsEndRef.current.scrollIntoView({behavior:"smooth"});
  }, [msgs]);

  async function carregarConversas() {
    const { data } = await supabase
      .from("mensagens_whatsapp")
      .select("telefone,nome_contato,conteudo,direcao,lida,criado_em")
      .order("criado_em", {ascending:false});

    if(!data) { setLoading(false); return; }

    // Group by telefone - last message per contact
    const map = {};
    data.forEach(function(m) {
      if(!map[m.telefone]) map[m.telefone] = {...m, nao_lidas: 0};
      if(!m.lida && m.direcao === "recebida") map[m.telefone].nao_lidas++;
    });

    const lista = Object.values(map).sort(function(a,b){ return new Date(b.criado_em) - new Date(a.criado_em); });
    setConversas(lista);
    const totalNaoLidas = lista.reduce(function(s,c){ return s + c.nao_lidas; }, 0);
    onUnread(totalNaoLidas);
    setLoading(false);
  }

  async function carregarMensagens(telefone) {
    const { data } = await supabase
      .from("mensagens_whatsapp")
      .select("*")
      .eq("telefone", telefone)
      .order("criado_em", {ascending:true});
    setMsgs(data || []);

    // Marcar como lidas
    await supabase.from("mensagens_whatsapp")
      .update({lida:true})
      .eq("telefone", telefone)
      .eq("direcao", "recebida")
      .eq("lida", false);

    await carregarConversas();
  }

  function nomeContato(telefone) {
    const conv = conversas.find(function(c){ return c.telefone === telefone; });
    if(conv?.nome_contato) return conv.nome_contato;
    const emb = embs.find(function(e){ return String(e.whatsapp||"").replace(/[^0-9]/g,"").includes(telefone.slice(-8)); });
    return emb ? emb.nome : telefone;
  }

  async function enviarResposta() {
    if(!texto.trim() || !ativa) return;
    setEnviando(true);
    const fone = ativa.telefone;
    try {
      const res = await fetch(
        "https://graph.facebook.com/v19.0/" + CONFIG.META_PHONE_ID + "/messages",
        {
          method: "POST",
          headers: {"Content-Type":"application/json", Authorization:"Bearer "+CONFIG.META_TOKEN},
          body: JSON.stringify({
            messaging_product: "whatsapp",
            to: fone,
            type: "text",
            text: { body: texto }
          })
        }
      );
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);

      // Save sent message to DB
      await supabase.from("mensagens_whatsapp").insert({
        telefone: fone, direcao: "enviada",
        conteudo: texto, lida: true,
        nome_contato: nomeContato(fone)
      });

      setTexto("");
      await carregarMensagens(fone);
    } catch(e) { alert("Erro ao enviar: "+e.message); }
    setEnviando(false);
  }

  function formatHora(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }
  function formatData(iso) {
    return new Date(iso).toLocaleDateString("pt-BR");
  }

  if(loading) return <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Carregando conversas...</p>;

  return (
    <div className="fade-in" style={{display:"flex",gap:0,border:"1px solid "+T.g200,height:600,overflow:"hidden"}}>

      {/* Lista de conversas */}
      <div style={{width:280,borderRight:"1px solid "+T.g200,overflowY:"auto",flexShrink:0}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid "+T.g200}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase"}}>Conversas</p>
        </div>
        {conversas.length === 0 && (
          <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,padding:20}}>Nenhuma mensagem recebida ainda.</p>
        )}
        {conversas.map(function(c) {
          const sel = ativa?.telefone === c.telefone;
          return (
            <div key={c.telefone} onClick={function(){ setAtiva(c); }}
              style={{padding:"14px 20px",borderBottom:"1px solid "+T.g200,cursor:"pointer",background:sel?T.g100:"transparent"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <p style={{fontFamily:T.sans,fontSize:13,fontWeight:sel?600:400}}>{nomeContato(c.telefone)}</p>
                {c.nao_lidas > 0 && (
                  <span style={{background:T.black,color:T.white,fontFamily:T.sans,fontSize:10,borderRadius:10,padding:"2px 7px",flexShrink:0}}>{c.nao_lidas}</span>
                )}
              </div>
              <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                {c.direcao==="enviada"?"Você: ":""}{c.conteudo}
              </p>
              <p style={{fontFamily:T.sans,fontSize:10,color:T.g300,marginTop:4}}>{formatData(c.criado_em)}</p>
            </div>
          );
        })}
      </div>

      {/* Área de mensagens */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {!ativa ? (
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Selecione uma conversa</p>
          </div>
        ) : (
          <>
            {/* Header */}
            <div style={{padding:"16px 20px",borderBottom:"1px solid "+T.g200,flexShrink:0}}>
              <p style={{fontFamily:T.sans,fontSize:13,fontWeight:600}}>{nomeContato(ativa.telefone)}</p>
              <p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{ativa.telefone}</p>
            </div>

            {/* Mensagens */}
            <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:10}}>
              {msgs.map(function(m) {
                const sent = m.direcao === "enviada";
                return (
                  <div key={m.id} style={{display:"flex",justifyContent:sent?"flex-end":"flex-start"}}>
                    <div style={{maxWidth:"72%",background:sent?T.black:T.g100,color:sent?T.white:T.black,padding:"10px 14px",borderRadius:2}}>
                      <p style={{fontFamily:T.sans,fontSize:13,lineHeight:1.5}}>{m.conteudo}</p>
                      <p style={{fontFamily:T.sans,fontSize:10,color:sent?"#aaa":T.g400,marginTop:4,textAlign:"right"}}>{formatHora(m.criado_em)}</p>
                    </div>
                  </div>
                );
              })}
              <div ref={msgsEndRef}/>
            </div>

            {/* Input */}
            <div style={{padding:16,borderTop:"1px solid "+T.g200,display:"flex",gap:10,flexShrink:0}}>
              <input
                value={texto}
                onChange={function(e){ setTexto(e.target.value); }}
                onKeyDown={function(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); enviarResposta(); } }}
                placeholder="Digite sua mensagem..."
                style={{flex:1,fontFamily:T.sans,fontSize:13,padding:"10px 14px",border:"1px solid "+T.g200,outline:"none"}}
              />
              <button onClick={enviarResposta} disabled={enviando||!texto.trim()}
                style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 20px",background:enviando||!texto.trim()?T.g200:T.black,color:T.white,border:"none",cursor:enviando||!texto.trim()?"not-allowed":"pointer",flexShrink:0}}>
                {enviando ? "..." : "Enviar"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}



function PagePreEstreia() {
  const [lista, setLista] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [form, setForm] = React.useState({nome:"", telefone:""});
  const [salvando, setSalvando] = React.useState(false);
  const [msg, setMsg] = React.useState({text:"",ok:false});
  const [busca, setBusca] = React.useState("");
  const [csvMode, setCsvMode] = React.useState(false);
  const [csvPreview, setCsvPreview] = React.useState([]);
  const [csvErros, setCsvErros] = React.useState([]);
  const [importando, setImportando] = React.useState(false);
  const [resImport, setResImport] = React.useState(null);
  const setF = function(k,v){ setForm(function(p){ return {...p,[k]:v}; }); };

  function parseCsvEstreia(text) {
    setCsvPreview([]); setCsvErros([]); setResImport(null);
    const lines = text.trim().split(String.fromCharCode(10));
    if(lines.length < 2) { setCsvErros(["Arquivo vazio ou sem dados"]); return; }
    const headers = lines[0].split(",").map(function(h){ return h.trim().replace(/"/g,"").toLowerCase(); });
    if(!headers.includes("nome") || !headers.includes("telefone")) {
      setCsvErros(["Colunas obrigatorias ausentes: nome e/ou telefone"]); return;
    }
    const rows = []; const erros = [];
    for(let i=1; i<lines.length; i++) {
      const vals = lines[i].split(",").map(function(v){ return v.trim().replace(/^"|"$/g,""); });
      const row = {};
      headers.forEach(function(h,idx){ row[h] = vals[idx]||""; });
      if(!row.nome || !row.telefone) { erros.push("Linha "+(i+1)+": nome ou telefone vazio"); }
      else { rows.push(row); }
    }
    setCsvPreview(rows); setCsvErros(erros);
  }

  function handleCsvFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){ parseCsvEstreia(ev.target.result); };
    reader.readAsText(file, "UTF-8");
  }

  async function importarCsv() {
    if(!csvPreview.length) return;
    setImportando(true); setResImport(null);
    let ok=0; const erros=[];
    for(const row of csvPreview) {
      const {error} = await supabase.from("pre_estreia").insert({
        nome: row.nome,
        telefone: row.telefone.replace(/[^0-9]/g,"")
      });
      if(error) { erros.push(row.nome+": "+error.message); } else { ok++; }
    }
    setResImport({ok, erros});
    if(ok>0) load();
    setImportando(false);
  }

  async function load() {
    setLoading(true);
    const {data} = await supabase.from("pre_estreia").select("*").order("criado_em", {ascending:false});
    // Check which phones are already registered as embaixadores
    const {data: embs} = await supabase.from("embaixadores").select("whatsapp");
    const fones = (embs||[]).map(function(e){ return String(e.whatsapp||"").replace(/[^0-9]/g,"").slice(-8); });
    const enriched = (data||[]).map(function(c){
      const fone = String(c.telefone||"").replace(/[^0-9]/g,"").slice(-8);
      return {...c, cadastrado: fones.includes(fone)};
    });
    setLista(enriched);
    setLoading(false);
  }

  React.useEffect(function(){ load(); }, []);

  async function salvar() {
    if(!form.nome||!form.telefone){ setMsg({text:"Preencha nome e telefone.",ok:false}); return; }
    setSalvando(true); setMsg({text:"",ok:false});
    const {error} = await supabase.from("pre_estreia").insert({nome:form.nome, telefone:form.telefone.replace(/[^0-9]/g,"")});
    if(error){ setMsg({text:"Erro: "+error.message,ok:false}); }
    else { setMsg({text:"Contato adicionado!",ok:true}); setForm({nome:"",telefone:""}); load(); }
    setSalvando(false);
  }

  async function remover(id) {
    if(!confirm("Remover este contato?")) return;
    await supabase.from("pre_estreia").delete().eq("id",id);
    load();
  }

  const filtrada = lista.filter(function(c){
    if(!busca) return true;
    return c.nome.toLowerCase().includes(busca.toLowerCase()) || c.telefone.includes(busca);
  });

  const totalDisparos = lista.reduce(function(s,c){ return s+(c.disparos||0); },0);
  const totalCadastrados = lista.filter(function(c){ return c.cadastrado; }).length;

  return (
    <div className="fade-in" style={{maxWidth:760}}>
      <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",color:T.g400,textTransform:"uppercase",marginBottom:4}}>Programa</p>
      <h2 style={{fontFamily:T.serif,fontSize:32,fontWeight:300,marginBottom:8}}>Pré-estreia</h2>
      <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,marginBottom:32}}>Clientes selecionados para convite antecipado ao programa</p>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:1,background:T.g200,border:"1px solid "+T.g200,marginBottom:40}}>
        {[[lista.length,"Convidados"],[totalCadastrados,"Cadastrados"],[totalDisparos,"Disparos"]].map(function(arr,i){
          return (
            <div key={i} style={{background:T.white,padding:"20px 24px"}}>
              <p style={{fontFamily:T.serif,fontSize:28,fontWeight:300,marginBottom:4}}>{arr[0]}</p>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.12em",textTransform:"uppercase",color:T.g400}}>{arr[1]}</p>
            </div>
          );
        })}
      </div>

      {/* Toggle manual / csv */}
      <div style={{display:"flex",gap:0,marginBottom:24,borderBottom:"1px solid "+T.g200}}>
        {[["manual","Adicionar manual"],["csv","Importar CSV"]].map(function(arr){
          const v=arr[0],l=arr[1];
          return (
            <button key={v} onClick={function(){setCsvMode(v==="csv");setCsvPreview([]);setCsvErros([]);setResImport(null);setMsg({text:"",ok:false});}}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"12px 24px",background:"transparent",border:"none",borderBottom:"2px solid "+(!csvMode&&v==="manual"||csvMode&&v==="csv"?T.black:"transparent"),color:(!csvMode&&v==="manual"||csvMode&&v==="csv"?T.black:T.g400),cursor:"pointer"}}>
              {l}
            </button>
          );
        })}
      </div>

      {/* Formulário manual */}
      {!csvMode && (
        <div style={{border:"1px solid "+T.g200,padding:24,marginBottom:32}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:12,alignItems:"end"}}>
            <Input label="Nome" value={form.nome} onChange={function(e){setF("nome",e.target.value);}}/>
            <Input label="Telefone (WhatsApp)" value={form.telefone} onChange={function(e){setF("telefone",e.target.value);}} placeholder="11999998888"/>
            <button onClick={salvar} disabled={salvando}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 20px",background:salvando?T.g200:T.black,color:T.white,border:"none",cursor:"pointer",height:40,whiteSpace:"nowrap"}}>
              {salvando?"Salvando...":"+ Adicionar"}
            </button>
          </div>
          {msg.text && <Alert msg={msg.text} ok={msg.ok}/>}
        </div>
      )}

      {/* Importar CSV */}
      {csvMode && (
        <div style={{border:"1px solid "+T.g200,padding:24,marginBottom:32}}>
          <div style={{marginBottom:16,padding:"12px 16px",background:"#f9f9f9",border:"1px solid "+T.g200}}>
            <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginBottom:4}}>Colunas obrigatorias:</p>
            <p style={{fontFamily:T.sans,fontSize:12,fontWeight:600,letterSpacing:"0.05em"}}>nome, telefone</p>
            <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:4}}>Coluna opcional: nenhuma — apenas nome e telefone sao necessarios</p>
          </div>
          <input type="file" accept=".csv" onChange={handleCsvFile} style={{fontFamily:T.sans,fontSize:12,cursor:"pointer",marginBottom:16}}/>
          {csvErros.length>0 && (
            <div style={{background:"#fff0f0",border:"1px solid #fcc",padding:12,marginBottom:12}}>
              {csvErros.map(function(e,i){ return <p key={i} style={{fontFamily:T.sans,fontSize:12,color:"#c00"}}>{e}</p>; })}
            </div>
          )}
          {csvPreview.length>0 && (
            <div style={{marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:12,color:T.g400,marginBottom:8}}>{csvPreview.length} contato{csvPreview.length!==1?"s":""} encontrados</p>
              <div style={{border:"1px solid "+T.g200,maxHeight:180,overflowY:"auto",marginBottom:12}}>
                {csvPreview.slice(0,5).map(function(r,i){
                  return (
                    <div key={i} style={{display:"flex",gap:24,padding:"8px 12px",borderBottom:"1px solid "+T.g200,fontFamily:T.sans,fontSize:12}}>
                      <span style={{flex:2}}>{r.nome}</span>
                      <span style={{flex:2,color:T.g400}}>{r.telefone}</span>
                    </div>
                  );
                })}
                {csvPreview.length>5 && <p style={{padding:"6px 12px",fontFamily:T.sans,fontSize:11,color:T.g400}}>+{csvPreview.length-5} mais...</p>}
              </div>
              <button onClick={importarCsv} disabled={importando}
                style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"12px 28px",background:importando?T.g200:T.black,color:T.white,border:"none",cursor:importando?"not-allowed":"pointer"}}>
                {importando?"Importando...":"Importar "+csvPreview.length+" contatos"}
              </button>
            </div>
          )}
          {resImport && (
            <div style={{padding:16,border:"1px solid "+T.g200,marginTop:8}}>
              <p style={{fontFamily:T.sans,fontSize:13,fontWeight:600,color:resImport.ok>0?"#2a7a2a":"#c00",marginBottom:4}}>
                {resImport.ok} importado{resImport.ok!==1?"s":""} com sucesso
              </p>
              {resImport.erros.map(function(e,i){ return <p key={i} style={{fontFamily:T.sans,fontSize:11,color:"#c00"}}>{e}</p>; })}
            </div>
          )}
          <div style={{marginTop:20,paddingTop:16,borderTop:"1px solid "+T.g200}}>
            <button onClick={function(){
              const blob = new Blob(["nome,telefone"+String.fromCharCode(10)+"Maria Silva,11999998888"], {type:"text/csv;charset=utf-8;"});
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a"); a.href=url; a.download="modelo_pre_estreia.csv"; a.click();
              URL.revokeObjectURL(url);
            }} style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 20px",border:"1px solid "+T.g200,background:"transparent",cursor:"pointer"}}>
              Baixar modelo CSV
            </button>
          </div>
        </div>
      )}

      {/* Busca */}
      <div style={{marginBottom:16}}>
        <Input label="" value={busca} onChange={function(e){setBusca(e.target.value);}} placeholder="Buscar por nome ou telefone..."/>
      </div>

      {/* Lista */}
      {loading ? <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Carregando...</p> : (
        <div style={{border:"1px solid "+T.g200}}>
          {/* Header */}
          <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr auto",gap:16,padding:"10px 16px",borderBottom:"1px solid "+T.g200,background:"#fafafa"}}>
            {["Nome","Telefone","Disparos","Cadastrado",""].map(function(h,i){
              return <p key={i} style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400}}>{h}</p>;
            })}
          </div>
          {filtrada.length === 0 && (
            <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,padding:24}}>Nenhum contato ainda.</p>
          )}
          {filtrada.map(function(c){
            return (
              <div key={c.id} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1fr 1fr auto",gap:16,padding:"14px 16px",borderBottom:"1px solid "+T.g200,alignItems:"center"}}>
                <p style={{fontFamily:T.sans,fontSize:13}}>{c.nome}</p>
                <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>{c.telefone}</p>
                <p style={{fontFamily:T.sans,fontSize:13,textAlign:"center"}}>{c.disparos||0}</p>
                <div>
                  <span style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",padding:"4px 10px",border:"1px solid "+(c.cadastrado?"#2a7a2a":T.g200),color:c.cadastrado?"#2a7a2a":T.g400,background:c.cadastrado?"#f0fff0":"transparent"}}>
                    {c.cadastrado?"Sim":"Não"}
                  </span>
                </div>
                <button onClick={function(){remover(c.id);}}
                  style={{fontFamily:T.sans,fontSize:11,color:"#c00",background:"transparent",border:"none",cursor:"pointer",padding:"4px 8px"}}>
                  ✕
                </button>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}



function PageWhatsApp({ embs }) {
  const [templates, setTemplates] = React.useState([]);
  const [loadingTpl, setLoadingTpl] = React.useState(false);
  const [tplError, setTplError] = React.useState("");
  const [selectedTpl, setSelectedTpl] = React.useState(null);
  const [destino, setDestino] = React.useState("todos");
  const [embSel, setEmbSel] = React.useState([]);
  const [sending, setSending] = React.useState(false);
  const [sendLog, setSendLog] = React.useState([]);
  const [agendando, setAgendando] = React.useState(false);
  const [agendado, setAgendado] = React.useState(null); // {date, time}
  const [agendamentos, setAgendamentos] = React.useState([]);

  React.useEffect(function(){ carregarAgendamentos(); }, []);

  async function carregarAgendamentos() {
    const { data } = await supabase
      .from("agendamentos_disparo")
      .select("*")
      .eq("status","pendente")
      .order("agendado_para", {ascending:true});
    setAgendamentos(data||[]);
  }

  async function salvarAgendamento() {
    if(!selectedTpl) { alert("Selecione um template."); return; }
    if(!agendado || !agendado.date || !agendado.time) { alert("Selecione data e horario."); return; }
    const lista = destinatarios();
    if(!lista.length) { alert("Nenhum destinatario selecionado."); return; }
    const datetime = new Date(agendado.date + "T" + agendado.time + ":00");
    if(datetime <= new Date()) { alert("Selecione uma data e horario futuros."); return; }
    const destinatariosJson = lista.map(function(e){ return {id:e.id, nome:e.nome, whatsapp:e.whatsapp, cupom:e.cupom||"", _estreia:e._estreia||false}; });
    const { error } = await supabase.from("agendamentos_disparo").insert({
      agendado_para: datetime.toISOString(),
      template_name: selectedTpl.name,
      template_language: selectedTpl.language,
      destino: destino,
      destinatarios: destinatariosJson,
      total: lista.length,
      status: "pendente"
    });
    if(error) { alert("Erro ao agendar: " + error.message); return; }
    await carregarAgendamentos();
    setAgendando(false);
    setAgendado(null);
    alert("Disparo agendado para " + datetime.toLocaleString("pt-BR") + " para " + lista.length + " destinatarios.");
  }

  async function cancelarAgendamento(id) {
    if(!confirm("Cancelar este agendamento?")) return;
    await supabase.from("agendamentos_disparo").update({status:"cancelado"}).eq("id",id);
    await carregarAgendamentos();
  }
  const [automacoes, setAutomacoes] = React.useState({
    novo_cadastro: { ativo: false, template: "" },
    marco_atingido: { ativo: false, template: "" },
    resgate_solicitado: { ativo: false, template: "" },
    inativo_30d: { ativo: false, template: "" },
  });
  const [savingAuto, setSavingAuto] = React.useState(false);
  const [msgAuto, setMsgAuto] = React.useState("");

  const autoLabels = {
    novo_cadastro: "Novo cadastro aprovado",
    marco_atingido: "Marco de vendas atingido",
    resgate_solicitado: "Resgate solicitado",
    inativo_30d: "Embaixador inativo há 30 dias",
  };

  React.useEffect(function() {
    carregarTemplates();
    carregarAutomacoes();
  }, []);

  async function carregarTemplates() {
    setLoadingTpl(true); setTplError("");
    try {
      const res = await fetch(
        "https://graph.facebook.com/v19.0/" + CONFIG.META_WABA_ID + "/message_templates?fields=name,status,language,components&limit=50",
        { headers: { Authorization: "Bearer " + CONFIG.META_TOKEN } }
      );
      const data = await res.json();
      if(data.error) { setTplError(data.error.message); setLoadingTpl(false); return; }
      const aprovados = (data.data || []).filter(function(t) { return t.status === "APPROVED"; });
      setTemplates(aprovados);
    } catch(e) { setTplError("Erro ao carregar templates: " + e.message); }
    setLoadingTpl(false);
  }

  async function carregarAutomacoes() {
    const { data } = await supabase.from("config").select("*").eq("chave","whatsapp_automacoes").maybeSingle();
    if(data?.valor) { try { setAutomacoes(JSON.parse(data.valor)); } catch(e){} }
  }

  async function salvarAutomacoes() {
    setSavingAuto(true); setMsgAuto("");
    await supabase.from("config").upsert({chave:"whatsapp_automacoes", valor: JSON.stringify(automacoes)},{onConflict:"chave"});
    setSavingAuto(false); setMsgAuto("Automações salvas!");
    setTimeout(function(){ setMsgAuto(""); }, 3000);
  }

  function tplPreview(tpl) {
    if(!tpl) return "";
    const body = (tpl.components || []).find(function(c){ return c.type === "BODY"; });
    return body ? body.text : "(sem preview)";
  }

  const [listaEstreia, setListaEstreia] = React.useState([]);
  React.useEffect(function(){
    if(destino === "estreia") {
      supabase.from("pre_estreia").select("*").then(function(r){ setListaEstreia(r.data||[]); });
    }
  }, [destino]);

  function destinatarios() {
    if(destino === "todos") return embs.filter(function(e){ return e.status === "ativo"; });
    if(destino === "destaque") return embs.filter(function(e){ return e.nivel === "destaque" || e.nivel === "influenciador"; });
    if(destino === "selecao") return embs.filter(function(e){ return embSel.includes(e.id); });
    if(destino === "estreia") return listaEstreia.map(function(c){ return {id:c.id, nome:c.nome, whatsapp:c.telefone, cupom:"", disparos:c.disparos, _estreia:true}; });
    return [];
  }

  function buildComponents(tpl, emb) {
    // Detect how many variables the template body has
    const body = (tpl.components || []).find(function(c){ return c.type === "BODY"; });
    if(!body || !body.text) return [];
    const matches = body.text.match(/{{[0-9]+}}/g) || [];
    const count = matches.length;
    if(count === 0) return [];

    // Map variable positions to data
    // Convention: {{1}} = nome, {{2}} = link painel, {{3}} = cupom
    const portalUrl = "https://embaixadores.saintgermainbrand.com.br";
    const params = [
      emb.nome || "",
      portalUrl,
      emb.cupom || "",
      emb.instagram || "",
    ];

    const parameters = [];
    for(let i = 0; i < count; i++) {
      parameters.push({ type: "text", text: params[i] || "" });
    }
    return [{ type: "body", parameters }];
  }

  async function disparar() {
    if(!selectedTpl) { alert("Selecione um template."); return; }
    const lista = destinatarios();
    if(!lista.length) { alert("Nenhum destinatário selecionado."); return; }
    if(!confirm("Disparar para " + lista.length + " embaixadores?")) return;
    setSending(true); setSendLog([]);
    for(const emb of lista) {
      const fone = String(emb.whatsapp || "").replace(/[^0-9]/g,"");
      if(!fone) { setSendLog(function(l){ return [...l, {nome:emb.nome,ok:false,msg:"Sem WhatsApp"}]; }); continue; }
      try {
        const res = await fetch(
          "https://graph.facebook.com/v19.0/" + CONFIG.META_PHONE_ID + "/messages",
          {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: "Bearer " + CONFIG.META_TOKEN },
            body: JSON.stringify({
              messaging_product: "whatsapp",
              to: fone.startsWith("55") ? fone : "55" + fone,
              type: "template",
              template: {
                name: selectedTpl.name,
                language: { code: selectedTpl.language },
                components: buildComponents(selectedTpl, emb)
              }
            })
          }
        );
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        setSendLog(function(l){ return [...l, {nome:emb.nome,ok:true,msg:"Enviado"}]; });
        if(emb._estreia) {
          await supabase.from("pre_estreia").update({disparos: (emb.disparos||0)+1}).eq("id", emb.id);
        }
      } catch(e) {
        setSendLog(function(l){ return [...l, {nome:emb.nome,ok:false,msg:e.message}]; });
      }
      await new Promise(function(r){ setTimeout(r, 200); }); // rate limit
    }
    setSending(false);
  }

  return (
    <div className="fade-in" style={{maxWidth:640}}>
      <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",color:T.g400,textTransform:"uppercase",marginBottom:4}}>WhatsApp Business API</p>
      <h2 style={{fontFamily:T.serif,fontSize:32,fontWeight:300,marginBottom:32}}>Disparos</h2>

      {/* -- DISPARO MANUAL -- */}
      <div style={{marginBottom:48}}>
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:20}}>Disparo Manual</p>

        {/* Templates */}
        <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",color:T.g400,textTransform:"uppercase",marginBottom:8}}>Template aprovado</p>
        {loadingTpl && <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Carregando templates...</p>}
        {tplError && <p style={{fontFamily:T.sans,fontSize:13,color:"#c00"}}>{tplError}</p>}
        {!loadingTpl && !tplError && (
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {templates.length === 0 && <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Nenhum template aprovado encontrado.</p>}
            {templates.map(function(t) {
              const sel = selectedTpl?.name === t.name;
              return (
                <div key={t.name} onClick={function(){ setSelectedTpl(t); }}
                  style={{border:"1px solid " + (sel ? T.black : T.g200),padding:"12px 16px",cursor:"pointer",borderRadius:2,background:sel?T.black:T.white}}>
                  <p style={{fontFamily:T.sans,fontSize:12,fontWeight:600,color:sel?T.white:T.black,marginBottom:4}}>{t.name}</p>
                  <p style={{fontFamily:T.sans,fontSize:11,color:sel?"#ccc":T.g400,lineHeight:1.5}}>{tplPreview(t).substring(0,120)}{tplPreview(t).length>120?"...":""}</p>
                </div>
              );
            })}
          </div>
        )}

        {/* Destinatários */}
        <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",color:T.g400,textTransform:"uppercase",marginBottom:8}}>Destinatários</p>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["todos","Todos ativos"],["destaque","Destaque e Influenciadores"],["estreia","Pré-estreia"],["selecao","Seleção manual"]].map(function([v,l]){
            return (
              <button key={v} onClick={function(){ setDestino(v); }}
                style={{fontFamily:T.sans,fontSize:11,padding:"8px 16px",border:"1px solid "+(destino===v?T.black:T.g200),background:destino===v?T.black:T.white,color:destino===v?T.white:T.black,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>
                {l}
              </button>
            );
          })}
        </div>

        {destino === "selecao" && (
          <div style={{border:"1px solid "+T.g200,padding:16,marginBottom:16,maxHeight:200,overflowY:"auto"}}>
            {embs.filter(function(e){ return e.status==="ativo"; }).map(function(e){
              const checked = embSel.includes(e.id);
              return (
                <div key={e.id} onClick={function(){ setEmbSel(function(s){ return checked?s.filter(function(x){return x!==e.id;}):[...s,e.id]; }); }}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer",borderBottom:"1px solid "+T.g200}}>
                  <div style={{width:16,height:16,border:"1px solid "+(checked?T.black:T.g300),background:checked?T.black:"transparent",flexShrink:0}}/>
                  <span style={{fontFamily:T.sans,fontSize:12}}>{e.nome}</span>
                  <span style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginLeft:"auto"}}>{e.cupom}</span>
                </div>
              );
            })}
          </div>
        )}

        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <button onClick={disparar} disabled={sending}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 28px",background:sending?T.g200:T.black,color:T.white,border:"none",cursor:sending?"not-allowed":"pointer"}}>
              {sending ? "Enviando..." : "Disparar agora"}
            </button>
            <button onClick={function(){ setAgendando(!agendando); setAgendado(null); }}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 28px",background:"transparent",color:T.black,border:"1px solid "+T.black,cursor:"pointer"}}>
              Agendar
            </button>
            <span style={{fontFamily:T.sans,fontSize:12,color:T.g400}}>
              {destinatarios().length} destinatario{destinatarios().length!==1?"s":""}
            </span>
          </div>

          {agendando && (
            <div style={{border:"1px solid "+T.g200,padding:20,marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:16}}>Agendar disparo</p>
              <div style={{display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}}>
                <div>
                  <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Data</p>
                  <input type="date"
                    min={new Date().toISOString().split("T")[0]}
                    value={agendado ? agendado.date : ""}
                    onChange={function(e){ setAgendado(function(p){ return {...(p||{}), date:e.target.value}; }); }}
                    style={{fontFamily:T.sans,fontSize:13,padding:"10px 12px",border:"1px solid "+T.g200,background:T.white,cursor:"pointer"}}/>
                </div>
                <div>
                  <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Horario</p>
                  <input type="time"
                    value={agendado ? agendado.time : ""}
                    onChange={function(e){ setAgendado(function(p){ return {...(p||{}), time:e.target.value}; }); }}
                    style={{fontFamily:T.sans,fontSize:13,padding:"10px 12px",border:"1px solid "+T.g200,background:T.white,cursor:"pointer"}}/>
                </div>
                <button onClick={salvarAgendamento}
                  style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 20px",background:T.black,color:T.white,border:"none",cursor:"pointer"}}>
                  Confirmar agendamento
                </button>
                <button onClick={function(){ setAgendando(false); setAgendado(null); }}
                  style={{fontFamily:T.sans,fontSize:11,color:T.g400,background:"transparent",border:"none",cursor:"pointer"}}>
                  Cancelar
                </button>
              </div>
            </div>
          )}

          {agendamentos.length > 0 && (
            <div style={{border:"1px solid "+T.g200,padding:20}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:12}}>Agendamentos pendentes</p>
              {agendamentos.map(function(a){
                return (
                  <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid "+T.g200}}>
                    <div>
                      <p style={{fontFamily:T.sans,fontSize:13}}>{new Date(a.datetime).toLocaleString("pt-BR")}</p>
                      <p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>Template: {a.template} - {a.total} destinatario{a.total!==1?"s":""}</p>
                    </div>
                    <button onClick={function(){ cancelarAgendamento(a.id); }}
                      style={{fontFamily:T.sans,fontSize:11,color:"#c00",background:"transparent",border:"none",cursor:"pointer"}}>
                      Cancelar
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Log */}
        {sendLog.length > 0 && (
          <div style={{border:"1px solid "+T.g200,padding:16,maxHeight:200,overflowY:"auto"}}>
            {sendLog.map(function(l,i){
              return (
                <div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:"1px solid "+T.g200,fontFamily:T.sans,fontSize:12}}>
                  <span style={{color:l.ok?"#2a7a2a":"#c00",fontWeight:600}}>{l.ok?"✓":"✗"}</span>
                  <span style={{flex:1}}>{l.nome}</span>
                  <span style={{color:T.g400}}>{l.msg}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* -- AUTOMAÇÕES -- */}
      <div style={{borderTop:"1px solid "+T.g200,paddingTop:32}}>
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:20}}>Automações</p>
        <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,marginBottom:24,lineHeight:1.6}}>Configure qual template é enviado automaticamente em cada evento. As mensagens são disparadas via Edge Function do Supabase.</p>

        {Object.keys(automacoes).map(function(key) {
          const auto = automacoes[key];
          return (
            <div key={key} style={{borderBottom:"1px solid "+T.g200,padding:"20px 0"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <p style={{fontFamily:T.sans,fontSize:13,fontWeight:600}}>{autoLabels[key]}</p>
                <div onClick={function(){ setAutomacoes(function(a){ return {...a,[key]:{...a[key],ativo:!a[key].ativo}}; }); }}
                  style={{width:40,height:22,background:auto.ativo?T.black:T.g200,borderRadius:11,cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                  <div style={{position:"absolute",top:3,left:auto.ativo?20:3,width:16,height:16,background:T.white,borderRadius:"50%",transition:"left 0.2s"}}/>
                </div>
              </div>
              {auto.ativo && (
                <select value={auto.template} onChange={function(e){ const v=e.target.value; setAutomacoes(function(a){ return {...a,[key]:{...a[key],template:v}}; }); }}
                  style={{fontFamily:T.sans,fontSize:12,padding:"8px 12px",border:"1px solid "+T.g200,background:T.white,width:"100%",color:auto.template?T.black:T.g400}}>
                  <option value="">Selecionar template...</option>
                  {templates.map(function(t){ return <option key={t.name} value={t.name}>{t.name}</option>; })}
                </select>
              )}
            </div>
          );
        })}

        <div style={{display:"flex",alignItems:"center",gap:16,marginTop:24}}>
          <button onClick={salvarAutomacoes} disabled={savingAuto}
            style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 32px",background:savingAuto?T.g200:T.black,color:T.white,border:"none",cursor:"pointer"}}>
            {savingAuto ? "Salvando..." : "Salvar automações"}
          </button>
          {msgAuto && <p style={{fontFamily:T.sans,fontSize:13,color:"#2a7a2a"}}>{msgAuto}</p>}
        </div>
      </div>
    </div>
  );
}



// ============================================================
// APP ROOT
// ============================================================
function App(){
  const [user,setUser]=React.useState(null);
  const [checked,setChecked]=React.useState(false);

  React.useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null); setChecked(true);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  if(!checked) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner/></div>;

  async function handleLogout(){ await supabase.auth.signOut(); setUser(null); }

  if(!user) return <PageLogin onLogin={setUser}/>;

  const isAdmin=CONFIG.ADMIN_EMAILS.includes(user.email);
  if(isAdmin) return <PageAdmin user={user} onLogout={handleLogout}/>;
  return <PagePainel user={user} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
