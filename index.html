// -- NUVEMSHOP API via Supabase Edge Function (proxy) -------------------------
// As chamadas vão para: {SUPABASE_URL}/functions/v1/bright-api?action=...
// Isso evita bloqueio de CORS ao chamar a API da Nuvemshop direto do browser.
const NS = {
  proxy: `${CONFIG.SUPABASE_URL}/functions/v1/bright-api`,
  h: { "Content-Type":"application/json", "Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },

  async ordersByEmail(email) {
    try {
      const r = await fetch(`${this.proxy}?action=orders_by_email&email=${encodeURIComponent(email)}`, { headers: this.h });
      return r.ok ? r.json() : [];
    } catch { return []; }
  },

  async ordersByCoupon(code) {
    try {
      const r = await fetch(`${this.proxy}?action=orders_by_coupon&coupon=${encodeURIComponent(code)}`, { headers: this.h });
      return r.ok ? r.json() : [];
    } catch { return []; }
  },

  async createCoupon(code) {
    try {
      const r = await fetch(`${this.proxy}?action=create_coupon`, {
        method: "POST",
        headers: this.h,
        body: JSON.stringify({ code, percentage: CONFIG.COMISSAO_PCT * 100 }),
      });
      const data = await r.json();
      console.log("createCoupon response:", JSON.stringify(data));
      if (data.status === 201 || data.ok) return { ok: true };
      if (data.status === 422) return { ok: false, duplicate: true };
      return { ok: false };
    } catch(e) { console.error("createCoupon error:", String(e)); return { ok: false }; }
  },
};

// -- HELPERS ------------------------------------------------------------------
const gerarCupomBase = n => "SGB" + n.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^A-Z0-9]/g,"").slice(0,9);
const gerarCupom = (n, sufixo="") => {
  const base = gerarCupomBase(n);
  if (!sufixo) return base;
  // Com sufixo: encurta a base para caber o número (max 12 chars total)
  return base.slice(0, 12 - String(sufixo).length) + sufixo;
};
const brl = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);

// -- PAGE: CADASTRO (Landing page completa + formulario) ---------------------
function PageCadastro({ onNavigate }) {
  const [f, setF] = React.useState({nome:"",email:"",cpf:"",whatsapp:"",instagram:"",tiktok:""});
  const [aceite, setAceite] = React.useState(false);
  const [etapa, setEtapa] = React.useState("form"); // "form" | "cupom" | "sucesso"
  const [opcoesCupom, setOpcoesCupom] = React.useState([]);
  const [cupomEscolhido, setCupomEscolhido] = React.useState("");
  const [cupomFinal, setCupomFinal] = React.useState("");
  const [senha, setSenha] = React.useState("");
  const [senhaConfirm, setSenhaConfirm] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [loadingFinalizar, setLoadingFinalizar] = React.useState(false);
  const [loadingAcesso, setLoadingAcesso] = React.useState(false);
  const [err, setErr] = React.useState("");
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  // Gera opções de cupom a partir do nome
  function gerarOpcoes(nome) {
    const base = gerarCupomBase(nome);
    const nomePartes = nome.trim().toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^A-Z0-9 ]/g,"").split(" ").filter(Boolean);
    const primeiro = nomePartes[0] || "";
    const ultimo = nomePartes[nomePartes.length - 1] || "";
    const opcoes = new Set();
    opcoes.add(base); // SGBLUCASAGUIA
    if (primeiro) opcoes.add(("SGB" + primeiro).slice(0,12)); // SGBLUCAS
    if (ultimo && ultimo !== primeiro) opcoes.add(("SGB" + ultimo).slice(0,12)); // SGBAGUIA
    if (primeiro && ultimo && primeiro !== ultimo) opcoes.add(("SGB" + primeiro + ultimo).slice(0,12)); // SGBLUCASAGUIA
    if (primeiro) opcoes.add(("SGB" + primeiro + new Date().getFullYear().toString().slice(2)).slice(0,12)); // SGBLUCAS26
    return [...opcoes].slice(0,4);
  }

  // Etapa final: cria conta no Supabase Auth e vai para o painel
  async function criarContaEAcessar() {
    setErr("");
    if (!senha || senha.length < 6) { setErr("A senha deve ter pelo menos 6 caracteres."); return; }
    if (senha !== senhaConfirm) { setErr("As senhas não conferem."); return; }
    setLoadingAcesso(true);
    try {
      // Tenta criar conta
      const { data: signUpData, error: signUpErr } = await supabase.auth.signUp({ email: f.email, password: senha });
      
      if (signUpErr) {
        // Se já existe, tenta login direto com a senha informada
        if (signUpErr.message.toLowerCase().includes("already") || signUpErr.status === 400) {
          const { error: signInErr } = await supabase.auth.signInWithPassword({ email: f.email, password: senha });
          if (signInErr) { setErr("Usuário já cadastrado. Acesse seu painel pelo login."); setLoadingAcesso(false); return; }
          onNavigate("painel"); return;
        }
        setErr("Erro ao criar acesso: " + signUpErr.message);
        setLoadingAcesso(false); return;
      }

      // Conta criada — faz login
      const { error: signInErr } = await supabase.auth.signInWithPassword({ email: f.email, password: senha });
      if (signInErr) { setErr("Conta criada! Acesse pelo login com seu e-mail e senha."); setLoadingAcesso(false); return; }
      onNavigate("painel");
    } catch(e) { setErr("Erro inesperado: " + String(e)); }
    setLoadingAcesso(false);
  }

  // Etapa 1: valida formulário e elegibilidade, mostra opções de cupom
  async function avancarParaCupom() {
    setErr("");
    if (!f.nome||!f.email||!f.cpf||!f.whatsapp) { setErr("Preencha todos os campos obrigatórios."); return; }
    if (!aceite) { setErr("Aceite os termos para continuar."); return; }
    setLoading(true);
    try {
      const {data:ex} = await supabase.from("embaixadores").select("id,cupom").eq("email",f.email).maybeSingle();
      if (ex) { setErr("Este e-mail já está cadastrado. Acesse seu painel pelo login."); setLoading(false); return; }
      // Verifica cupons existentes na Nuvemshop antes de sugerir opções
      const opcoesTentativas = gerarOpcoes(f.nome);
      for (const cod of opcoesTentativas) {
        const chk = await fetch(CONFIG.EDGE_URL + "?action=check_coupon&code=" + encodeURIComponent(cod));
        const chkJson = await chk.json();
        if (chkJson.exists) {
          setErr("Já existe um cupom cadastrado para esse perfil. Entre em contato com a Saint Germain.");
          setLoading(false);
          return;
        }
      }
      const pedidos = await NS.ordersByEmail(f.email);
      // Nuvemshop statuses: paid, pending, authorized, voided, refunded, abandoned
      const statusValidos = ["paid", "authorized", "pending"];
      const pedidosPagos = (pedidos||[]).filter(p => statusValidos.includes(p.payment_status));
      console.log("Pedidos encontrados:", pedidos.length, "Pagos/válidos:", pedidosPagos.length, "Statuses:", [...new Set((pedidos||[]).map(p=>p.payment_status))]);
      if (!pedidosPagos.length) { setErr("Que pena! Não encontramos pedidos válidos com esse e-mail. Esse programa é exclusivo para clientes da Saint Germain."); setLoading(false); return; }
      const opcoes = gerarOpcoes(f.nome);
      setOpcoesCupom(opcoes);
      setCupomEscolhido(opcoes[0]);
      setEtapa("cupom");
    } catch { setErr("Erro inesperado. Tente novamente."); }
    setLoading(false);
  }

  // Etapa 2: cria o cupom escolhido e salva no Supabase
  async function finalizar() {
    setErr(""); setLoadingFinalizar(true);
    try {
      // Tenta criar o cupom; se duplicado, adiciona sufixo
      let cod = cupomEscolhido;
      let criado = await NS.createCoupon(cod);
      if (!criado.ok && criado.duplicate) {
        for (let i = 2; i <= 9; i++) {
          cod = cupomEscolhido.slice(0, 10) + i;
          criado = await NS.createCoupon(cod);
          if (criado.ok) break;
          if (!criado.duplicate) break;
        }
      }
      if (!criado || !criado.ok) { setErr("Este cupom já está em uso. Escolha outra opção."); setLoadingFinalizar(false); return; }

      const {error:dbErr} = await supabase.from("embaixadores").insert({
        nome:f.nome, email:f.email, cpf:f.cpf, whatsapp:f.whatsapp,
        instagram:f.instagram, tiktok:f.tiktok, cupom:cod, status:"ativo",
        nivel:"embaixador", comissao_pct:CONFIG.COMISSAO_PCT,
        aceite_termos_em:new Date().toISOString(), criado_em:new Date().toISOString()
      });
      if (dbErr) { setErr("Erro ao salvar cadastro. Tente novamente."); setLoadingFinalizar(false); return; }
      setCupomFinal(cod);
      setEtapa("sucesso");
    } catch { setErr("Erro inesperado. Tente novamente."); }
    setLoadingFinalizar(false);
  }

  // -- TELA SUCESSO + CRIAR SENHA -------------------------------------------
  if (etapa === "sucesso") return (
    <div style={{minHeight:"100vh",background:"#0a0a0a"}}>

      </header>
      <div style={{maxWidth:480,margin:"0 auto",padding:"72px 24px"}} className="stagger">
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:"rgba(255,255,255,0.4)",marginBottom:32}}>Bem-vindo ao time</p>

        <div style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",padding:"24px 32px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:40}}>
          <span style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:"rgba(255,255,255,0.35)"}}>Seu cupom exclusivo</span>
          <span style={{fontFamily:T.sans,fontSize:30,letterSpacing:"0.25em",color:"#fff"}}>{cupomFinal}</span>
          <span style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",color:"rgba(255,255,255,0.35)",marginTop:2}}>{(CONFIG.COMISSAO_PCT*100).toFixed(0)}% desconto — {(CONFIG.COMISSAO_PCT*100).toFixed(0)}% comissão por venda</span>

          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24,color:"rgba(255,255,255,0.4)"}}>Crie sua senha de acesso</p>
          <div style={{display:"flex",flexDirection:"column",gap:24,marginBottom:24}}>
            {[
              {label:"Senha *",val:senha,set:setSenha,type:"password",ph:"Mínimo 6 caracteres"},

                </div>
              );
            })}
          </div>
          {err && <div style={{marginBottom:24,padding:"12px 16px",border:"1px solid rgba(255,60,60,0.3)"}}><p style={{fontFamily:T.sans,fontSize:12,color:"#ff6b6b"}}>{err}</p></div>}

            {loadingAcesso

          </button>
        </div>
        <p style={{fontFamily:T.sans,fontSize:12,color:"rgba(255,255,255,0.28)",lineHeight:1.8}}>Em breve você receberá uma mensagem com os detalhes do programa e acesso ao grupo exclusivo.</p>
      </div>
    </div>

  // -- TELA ESCOLHA DO CUPOM ------------------------------------------------
  if (etapa === "cupom") return (

function PageLogin({ onLogin, onNavigate }) {
  const [email, setEmail] = React.useState("");
  const [senha, setSenha] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");
  const [modo, setModo] = React.useState("login"); // "login" | "recuperar"
  const [enviado, setEnviado] = React.useState(false);
  const [loadingRec, setLoadingRec] = React.useState(false);

  async function submit() {
    setErr(""); setLoading(true);
    const {data,error:e} = await supabase.auth.signInWithPassword({email,password:senha});
    if (e) { setErr("E-mail ou senha incorretos."); setLoading(false); return; }
    onLogin(data.user); setLoading(false);
  }

  async function enviarRecuperacao() {
    if (!email) { setErr("Digite seu e-mail para continuar."); return; }
    setErr(""); setLoadingRec(true);
    const {error:e} = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + window.location.pathname
    });
    setLoadingRec(false);
    if (e) { setErr("Não foi possível enviar o e-mail. Verifique o endereço."); return; }
    setEnviado(true);
  }

  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header/>
      <SplitLayout
        left={
          <div className="stagger" style={{display:"flex",flexDirection:"column",justifyContent:"center",height:"100%"}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g500,marginBottom:40}}>Painel do Embaixador</p>
            <h1 style={{fontFamily:T.serif,fontSize:52,fontWeight:300,color:T.white,lineHeight:1.08}}>
              {modo === "login" ? <span>Bem-vindo<br/><em>de volta.</em></span> : <span>Recuperar<br/><em>acesso.</em></span>}
            </h1>
          </div>
        }
        right={
          <div className="stagger" style={{display:"flex",flexDirection:"column",justifyContent:"center",height:"100%"}}>
            {modo === "login" ? (
              <>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:48}}>Entrar</p>
                <div style={{display:"flex",flexDirection:"column",gap:28,marginBottom:40}}>
                  <Input label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
                  <Input label="Senha" type="password" value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
                </div>
                {err && <div style={{marginBottom:24}}><Alert msg={err}/></div>}
                <BtnPrimary onClick={submit} loading={loading}>Entrar</BtnPrimary>
                <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:20,textAlign:"center"}}>
                  <TextLink onClick={()=>{ setErr(""); setModo("recuperar"); }}>Esqueci minha senha</TextLink>
                </p>
                <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:12,textAlign:"center"}}>Ainda não é embaixador?{" "}<TextLink onClick={()=>onNavigate("cadastro")}>Cadastre-se</TextLink></p>
              </>
            ) : enviado ? (
              <>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:48}}>Recuperação de senha</p>
                <div style={{padding:"24px",background:"#f9f6f2",marginBottom:32}}>
                  <p style={{fontFamily:T.sans,fontSize:13,color:T.g600,lineHeight:1.8}}>
                    Enviamos um link de redefinição para <strong>{email}</strong>. Verifique sua caixa de entrada (e a pasta de spam).
                  </p>
                </div>
                <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,textAlign:"center"}}>
                  <TextLink onClick={()=>{ setModo("login"); setEnviado(false); }}>← Voltar ao login</TextLink>
                </p>
              </>
            ) : (
              <>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:48}}>Recuperação de senha</p>
                <p style={{fontFamily:T.sans,fontSize:13,color:T.g500,lineHeight:1.8,marginBottom:32}}>
                  Digite seu e-mail e enviaremos um link para você redefinir sua senha.
                </p>
                <div style={{marginBottom:32}}>
                  <Input label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enviarRecuperacao()}/>
                </div>
                {err && <div style={{marginBottom:24}}><Alert msg={err}/></div>}
                <BtnPrimary onClick={enviarRecuperacao} loading={loadingRec}>Enviar link de recuperação</BtnPrimary>
                <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:20,textAlign:"center"}}>
                  <TextLink onClick={()=>{ setErr(""); setModo("login"); }}>← Voltar ao login</TextLink>
                </p>
              </>
            )}
          </div>
        }
      />
    </div>
  );
}

function PagePainel({ user, onLogout }) {
  const [emb, setEmb] = React.useState(null);
  const [cs, setCs] = React.useState([]);
  const [rs, setRs] = React.useState([]);
  const [banner, setBanner] = React.useState(null);
  const [grupoLink, setGrupoLink] = React.useState("");
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState("inicio");
  const [sync, setSync] = React.useState(false);
  const [fResgate, setFResgate] = React.useState({tipo:"credito",pix:""});
  const [msgR, setMsgR] = React.useState({text:"",ok:false});
  const [resgatando, setResgatando] = React.useState(false);

  // Perfil states
  const [perfil, setPerfil] = React.useState({pix_key:"",cep:"",endereco:"",numero:"",complemento:"",cidade:"",estado:""});
  const [salvandoPerfil, setSalvandoPerfil] = React.useState(false);
  const [msgPerfil, setMsgPerfil] = React.useState({text:"",ok:false});
  const [novaSenha, setNovaSenha] = React.useState("");
  const [confirmSenha, setConfirmSenha] = React.useState("");
  const [salvandoSenha, setSalvandoSenha] = React.useState(false);
  const [msgSenha, setMsgSenha] = React.useState({text:"",ok:false});
  const [copiadoLink, setCopiadoLink] = React.useState(false);

  React.useEffect(()=>{ load(); },[]);

  async function load() {
    setLoading(true);
    const {data:e} = await supabase.from("embaixadores").select("*").eq("email",user.email).single();
    if(!e){ setLoading(false); return; }
    setEmb(e);
    setPerfil({
      pix_key: e.pix_key||"",
      cep: e.cep||"", endereco: e.endereco||"",
      numero: e.numero||"", complemento: e.complemento||"",
      cidade: e.cidade||"", estado: e.estado||""
    });
    const {data:c} = await supabase.from("comissoes").select("*").eq("embaixador_id",e.id).order("criado_em",{ascending:false});
    setCs(c||[]);
    const {data:r} = await supabase.from("resgates").select("*").eq("embaixador_id",e.id).order("criado_em",{ascending:false});
    setRs(r||[]);
    // Carrega banner ativo
    const {data:b} = await supabase.from("config").select("*").eq("chave","banner_ativo").maybeSingle();
    if(b?.valor) setBanner(b.valor);
    setLoading(false);
  }

  async function sincronizar() {
    if(!emb) return; setSync(true);
    const pedidos = await NS.ordersByCoupon(emb.cupom);
    for(const p of (pedidos||[])){
      // Valida que o pedido realmente usou este cupom
      const cupons = (p.coupon || []);
      const usouCupom = cupons.some(function(c) {
        return String(c.code||"").toUpperCase() === String(emb.cupom).toUpperCase();
      });
      if(!usouCupom) continue;
      // Valida status do pagamento
      if(p.payment_status === "voided" || p.payment_status === "refunded") continue;
      const {data:ex} = await supabase.from("comissoes").select("id").eq("pedido_id",String(p.id)).maybeSingle();
      if(ex) continue;
      const val = parseFloat(p.total);
      const status = p.payment_status==="paid" ? (diasPassados(p.created_at,CONFIG.JANELA_DEVOLUCAO)?"confirmada":"pendente") : "pendente";
      await supabase.from("comissoes").insert({embaixador_id:emb.id,pedido_id:String(p.id),valor_pedido:val,valor_comissao:val*CONFIG.COMISSAO_PCT,status,payment_status:p.payment_status,criado_em:p.created_at});
    }
    await load(); setSync(false);
  }

  async function resgatar() {
    const saldo = cs.filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+c.valor_comissao,0);
    if(saldo<=0){ setMsgR({text:"Nenhum saldo disponível para resgate.",ok:false}); return; }
    if(fResgate.tipo==="pix"&&!fResgate.pix){ setMsgR({text:"Informe a chave Pix.",ok:false}); return; }
    setResgatando(true);
    await supabase.from("resgates").insert({embaixador_id:emb.id,valor:saldo,tipo:fResgate.tipo,pix_key:fResgate.tipo==="pix"?fResgate.pix:null,status:"solicitado",criado_em:new Date().toISOString()});
    await supabase.from("comissoes").update({resgatada:true}).eq("embaixador_id",emb.id).eq("status","confirmada").is("resgatada",null);
    setMsgR({text:"Resgate solicitado! O time entrará em contato em breve.",ok:true});
    await load(); setResgatando(false);
  }

  async function salvarPerfil() {
    setSalvandoPerfil(true); setMsgPerfil({text:"",ok:false});
    const {error} = await supabase.from("embaixadores").update({
      nome: perfil.nome, whatsapp: perfil.whatsapp,
      instagram: perfil.instagram, tiktok: perfil.tiktok,
      pix_key: perfil.pix_key, cep: perfil.cep, endereco: perfil.endereco,
      numero: perfil.numero, complemento: perfil.complemento,
      cidade: perfil.cidade, estado: perfil.estado
    }).eq("id",emb.id);
    setMsgPerfil(error ? {text:"Erro ao salvar.",ok:false} : {text:"Dados salvos com sucesso!",ok:true});
    setSalvandoPerfil(false);
  }

  async function trocarSenha() {
    setMsgSenha({text:"",ok:false});
    if(!novaSenha||novaSenha.length<6){ setMsgSenha({text:"A senha deve ter pelo menos 6 caracteres.",ok:false}); return; }
    if(novaSenha!==confirmSenha){ setMsgSenha({text:"As senhas não conferem.",ok:false}); return; }
    setSalvandoSenha(true);
    const {error} = await supabase.auth.updateUser({password:novaSenha});
    setMsgSenha(error ? {text:"Erro ao trocar senha: "+error.message,ok:false} : {text:"Senha alterada com sucesso!",ok:true});
    if(!error){ setNovaSenha(""); setConfirmSenha(""); }
    setSalvandoSenha(false);
  }

  function copiarLink() {
    navigator.clipboard.writeText(window.location.origin+window.location.pathname);
    setCopiadoLink(true);
    setTimeout(()=>setCopiadoLink(false),2500);
  }

  if(loading) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout}/><Spinner/></div>;
  if(!emb) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout}/><div style={{maxWidth:480,margin:"64px auto",padding:"0 24px"}}><Alert msg="Cadastro não encontrado para este e-mail."/></div></div>;

  const saldoDisp = cs.filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+c.valor_comissao,0);
  const saldoPend = cs.filter(c=>c.status==="pendente"&&c.payment_status==="paid").reduce((s,c)=>s+c.valor_comissao,0);
  const bStatus = {confirmada:["#000","Confirmada"],pendente:[T.g400,"Pendente"],paga:["#000","Paga"],cancelada:["#c00","Cancelado"]};
  // Map payment_status to display status
  function statusLabel(c) {
    if(c.payment_status==="voided"||c.payment_status==="refunded") return ["#c00","Cancelado"];
    if(c.payment_status==="abandoned") return [T.g400,"Abandonado"];
    return bStatus[c.status] || [T.g400, c.status];
  }
  const bResgate = {solicitado:[T.g400,"Solicitado"],aprovado:["#000","Aprovado"],pago:["#000","Pago"],recusado:["#c00","Recusado"]};

  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header user={user} onLogout={onLogout}/>
      <div className="painel-wrap fade-in" style={{maxWidth:960,margin:"0 auto",padding:"48px 32px 80px"}}>

        {/* Banner promoção ativa */}
        {banner && (
          <div style={{marginBottom:40,overflow:"hidden",borderRadius:0}}>
            <img src={banner} alt="Promoção ativa" style={{width:"100%",maxHeight:200,objectFit:"cover",display:"block"}}/>
          </div>
        )}

        {/* Saudação */}
        <div style={{marginBottom:40}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Olá, {emb.nome.split(" ")[0]}</p>
          <h2 style={{fontFamily:T.serif,fontSize:36,fontWeight:300}}>Embaixador Saint Germain</h2>
        </div>

        {/* Cupom */}
        <div className="cupom-bar" style={{background:T.black,padding:"24px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:40}}>
          <div>
            <p style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:T.g500,marginBottom:6}}>Seu cupom exclusivo</p>
            <p className="cupom-code" style={{fontFamily:T.sans,fontSize:28,letterSpacing:"0.22em",color:T.white}}>{emb.cupom}</p>
          </div>
          <button onClick={()=>{navigator.clipboard.writeText(emb.cupom);alert("Cupom copiado!");}}
            style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",background:"transparent",color:T.white,border:"1px solid rgba(255,255,255,0.4)",padding:"10px 20px",cursor:"pointer"}}>
            Copiar
          </button>
        </div>

        {/* Grupo VIP */}
        {grupoLink && (
          <div style={{marginBottom:40}}>
            <a href={grupoLink} target="_blank" rel="noopener noreferrer"
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",background:"none",border:`1px solid ${T.black}`,color:T.black,padding:"14px 28px",cursor:"pointer",textDecoration:"none",display:"inline-block"}}>
              Entrar no Grupo VIP WhatsApp →
            </a>
          </div>
        )}

        {/* Stats */}
        <StatGrid items={[[brl(saldoDisp),"Disponível para resgate"],[brl(saldoPend),"Pendente"],[brl(cs.reduce((s,c)=>s+c.valor_pedido,0)),"Total em vendas"],[brl(cs.filter(c=>c.payment_status==="paid"||c.status==="confirmada").reduce((s,c)=>s+c.valor_comissao,0)),"Comissão acumulada"]]} cols={4}/>

        {/* Tabs */}
        <Tabs tabs={["inicio","vendas","resgatar","perfil"]} labels={{inicio:"Início",vendas:`Vendas (${cs.length})`,resgatar:"Resgatar",perfil:"⚙ Perfil"}} active={tab} onChange={setTab}>

        {/* TAB INÍCIO */}
        {tab==="inicio" && (
          <div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase"}}>Últimas vendas</p>
              <BtnGhost onClick={sincronizar}>{sync?<span style={{width:12,height:12,border:"1.5px solid #a0a0a0",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>:"Sincronizar"}</BtnGhost>
            </div>
            {cs.length===0
              ? <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,paddingTop:16}}>Nenhuma venda registrada. Compartilhe seu cupom para começar.</p>
              : cs.slice(0,5).map(c=>(
                <Row key={c.id}
                  left={<div><p style={{fontFamily:T.sans,fontSize:13}}>Pedido #{c.pedido_id}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>{fmt(c.criado_em)}</p></div>}
                  right={<div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>{brl(c.valor_comissao)}</p><Badge text={statusLabel(c)[1]} color={statusLabel(c)[0]}/></div>}
                />
              ))
            }
            {cs.length>5&&<BtnGhost onClick={()=>setTab("vendas")} style={{marginTop:16}}>Ver todas ({cs.length}) →</BtnGhost>}
          </div>
        )}

        {/* TAB VENDAS */}
        {tab==="vendas" && (
          <div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase"}}>Histórico completo</p>
              <BtnGhost onClick={sincronizar}>{sync?<span style={{width:12,height:12,border:"1.5px solid #a0a0a0",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>:"Sincronizar"}</BtnGhost>
            </div>
            {cs.length===0
              ? <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,paddingTop:16}}>Nenhuma venda registrada ainda.</p>
              : cs.map(c=>(
                <Row key={c.id}
                  left={<div><p style={{fontFamily:T.sans,fontSize:13}}>Pedido #{c.pedido_id}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>{fmt(c.criado_em)} · Pedido: {brl(c.valor_pedido)}</p></div>}
                  right={<div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>+{brl(c.valor_comissao)}</p><Badge text={statusLabel(c)[1]} color={statusLabel(c)[0]}/></div>}
                />
              ))
            }
          </div>
        )}

        {/* TAB RESGATAR */}
        {tab==="resgatar" && (
          <div className="fade-in">
            <div style={{marginBottom:40}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:8}}>Saldo disponível</p>
              <p style={{fontFamily:T.serif,fontSize:64,fontWeight:300,lineHeight:1,marginBottom:4}}>{brl(saldoDisp)}</p>
              {saldoPend>0&&<p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{brl(saldoPend)} pendente — aguardando prazo de devolução</p>}
            </div>
            {saldoDisp>0&&(
              <div style={{maxWidth:400,marginBottom:48}}>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:20}}>Forma de resgate</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",border:`1px solid ${T.black}`,marginBottom:28}}>
                  {[["credito","Crédito na loja"],["pix","Pix"]].map(([val,lbl],i)=>(
                    <button key={val} onClick={()=>setFResgate(p=>({...p,tipo:val}))}
                      style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px",border:"none",borderRight:i===0?`1px solid ${T.black}`:"none",cursor:"pointer",background:fResgate.tipo===val?T.black:T.white,color:fResgate.tipo===val?T.white:T.black,transition:"all 0.15s"}}>
                      {lbl}
                    </button>
                  ))}
                </div>
                {fResgate.tipo==="pix"&&<div style={{marginBottom:28}}><Input label="Chave Pix" value={fResgate.pix} onChange={e=>setFResgate(p=>({...p,pix:e.target.value}))} placeholder="CPF, e-mail, telefone ou chave aleatória"/></div>}
                {msgR.text&&<div style={{marginBottom:24}}><Alert msg={msgR.text} ok={msgR.ok}/></div>}
                <BtnPrimary onClick={resgatar} loading={resgatando}>Solicitar {brl(saldoDisp)}</BtnPrimary>
                <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:12}}>Processado em até 5 dias úteis.</p>
              </div>
            )}
            {rs.length>0&&(
              <div>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:16}}>Histórico de resgates</p>
                {rs.map(r=>(
                  <Row key={r.id}
                    left={<div><p style={{fontFamily:T.sans,fontSize:13}}>{r.tipo==="pix"?"Pix":"Crédito na loja"}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>{fmt(r.criado_em)}</p></div>}
                    right={<div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>{brl(r.valor)}</p><Badge text={bResgate[r.status]?.[1]||r.status} color={bResgate[r.status]?.[0]||T.black}/></div>}
                  />
                ))}
              </div>
            )}
          </div>
        )}

        {/* TAB PERFIL */}
        {tab==="perfil" && (
          <div className="perfil-wrap fade-in" style={{maxWidth:560}}>

            {/* Dados pessoais */}
            <div style={{marginBottom:48}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24}}>Dados pessoais</p>
              <div style={{display:"flex",flexDirection:"column",gap:24,marginBottom:24}}>
                <Input label="Nome" value={perfil.nome||""} onChange={e=>setPerfil(p=>({...p,nome:e.target.value}))} placeholder="Seu nome completo"/>
                <Input label="WhatsApp" value={perfil.whatsapp||""} onChange={e=>setPerfil(p=>({...p,whatsapp:e.target.value}))} placeholder="(11) 99999-9999"/>
                <Input label="Instagram" value={perfil.instagram||""} onChange={e=>setPerfil(p=>({...p,instagram:e.target.value}))} placeholder="@seuusuario"/>
                <Input label="TikTok" value={perfil.tiktok||""} onChange={e=>setPerfil(p=>({...p,tiktok:e.target.value}))} placeholder="@seuusuario"/>
              </div>
            </div>

            {/* Dados para resgate */}
            <div style={{marginBottom:48}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24}}>Dados para resgate</p>
              <div style={{display:"flex",flexDirection:"column",gap:24,marginBottom:24}}>
                <Input label="Chave Pix" value={perfil.pix_key} onChange={e=>setPerfil(p=>({...p,pix_key:e.target.value}))} placeholder="CPF, e-mail, telefone ou chave aleatória"/>
              </div>
            </div>

            {/* Endereço */}
            <div style={{marginBottom:48}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24}}>Endereço</p>
              <div style={{display:"flex",flexDirection:"column",gap:24,marginBottom:24}}>
                <Input label="CEP" value={perfil.cep} onChange={e=>setPerfil(p=>({...p,cep:e.target.value}))} placeholder="00000-000"/>
                <Input label="Endereço" value={perfil.endereco} onChange={e=>setPerfil(p=>({...p,endereco:e.target.value}))} placeholder="Rua, Avenida..."/>
                <div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:16}}>
                  <Input label="Número" value={perfil.numero} onChange={e=>setPerfil(p=>({...p,numero:e.target.value}))}/>
                  <Input label="Complemento" value={perfil.complemento} onChange={e=>setPerfil(p=>({...p,complemento:e.target.value}))} placeholder="Apto, Bloco..."/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16}}>
                  <Input label="Cidade" value={perfil.cidade} onChange={e=>setPerfil(p=>({...p,cidade:e.target.value}))}/>
                  <Input label="Estado" value={perfil.estado} onChange={e=>setPerfil(p=>({...p,estado:e.target.value}))} placeholder="SP"/>
                </div>
              </div>
              {msgPerfil.text&&<div style={{marginBottom:16}}><Alert msg={msgPerfil.text} ok={msgPerfil.ok}/></div>}
              <BtnPrimary onClick={salvarPerfil} loading={salvandoPerfil}>Salvar dados</BtnPrimary>
            </div>

            {/* Trocar senha */}
            <div style={{marginBottom:48,borderTop:`1px solid ${T.g200}`,paddingTop:40}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24}}>Trocar senha</p>
              <div style={{display:"flex",flexDirection:"column",gap:24,marginBottom:24}}>
                <Input label="Nova senha" type="password" value={novaSenha} onChange={e=>setNovaSenha(e.target.value)} placeholder="Mínimo 6 caracteres"/>
                <Input label="Confirmar nova senha" type="password" value={confirmSenha} onChange={e=>setConfirmSenha(e.target.value)}/>
              </div>
              {msgSenha.text&&<div style={{marginBottom:16}}><Alert msg={msgSenha.text} ok={msgSenha.ok}/></div>}
              <BtnPrimary onClick={trocarSenha} loading={salvandoSenha}>Alterar senha</BtnPrimary>
            </div>

            {/* Indicar o programa */}
            <div style={{borderTop:`1px solid ${T.g200}`,paddingTop:40}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:8}}>Indicar o programa</p>
              <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,lineHeight:1.7,marginBottom:24}}>Conhece alguém que merece fazer parte? Compartilhe o link de cadastro.</p>
              <div style={{background:T.g100,padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <span style={{fontFamily:T.sans,fontSize:12,color:T.g500,wordBreak:"break-all"}}>{window.location.origin+window.location.pathname}</span>
              </div>
              <BtnPrimary onClick={copiarLink}>{copiadoLink?"✓ Link copiado!":"Copiar link de cadastro"}</BtnPrimary>
            </div>

          </div>
        )}

      </Tabs>
      </div>
    </div>
  );
}

// -- PAGE: ADMIN ---------------------------------------------------------------
function PageAdmin({ user, onLogout }) {
  const [embs, setEmbs] = React.useState([]);
  const [ress, setRess] = React.useState([]);
  const [fila, setFila] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState("embaixadores");
  const [busca, setBusca] = React.useState("");
  const [editEmb, setEditEmb] = React.useState(null);
  const [unread, setUnread] = React.useState(0);
  const [editForm, setEditForm] = React.useState({});
  const [savingEdit, setSavingEdit] = React.useState(false);
  const [msgEdit, setMsgEdit] = React.useState({text:"",ok:false});
  const [banner, setBanner] = React.useState("");
  const [bannerPreview, setBannerPreview] = React.useState(null);
  const [uploadando, setUploadando] = React.useState(false);
  const [msgBanner, setMsgBanner] = React.useState({text:"",ok:false});
  const [grupoLinkAdmin, setGrupoLinkAdmin] = React.useState("");
  const [salvandoGrupo, setSalvandoGrupo] = React.useState(false);
  const [msgGrupo, setMsgGrupo] = React.useState({text:"",ok:false});

  React.useEffect(()=>{load();},[]);

  async function load() {
    setLoading(true);
    const {data:e}=await supabase.from("embaixadores").select("*, comissoes(valor_comissao,status,resgatada)").order("criado_em",{ascending:false});
    setEmbs(e||[]);
    const {data:r}=await supabase.from("resgates").select("*, embaixadores(nome,email,cupom)").eq("status","solicitado").order("criado_em",{ascending:false});
    setRess(r||[]);
    const ontem=new Date(Date.now()-86400000).toISOString();
    const {data:novos}=await supabase.from("embaixadores").select("id,nome,whatsapp,cupom,criado_em").gte("criado_em",ontem);
    const t30=new Date(Date.now()-30*86400000).toISOString();
    const {data:inat}=await supabase.from("embaixadores").select("id,nome,whatsapp,cupom,ultimo_acesso").lt("ultimo_acesso",t30).eq("status","ativo");
    setFila([...(novos||[]).map(x=>({...x,motivo:"Novo cadastro — boas-vindas",p:"alta"})),...(inat||[]).map(x=>({...x,motivo:"Inativo +30d — reengajar",p:"media"}))]);
    setLoading(false);
    // Carrega banner atual
    const {data:b} = await supabase.from("config").select("valor").eq("chave","banner_ativo").maybeSingle();
    if(b?.valor) setBanner(b.valor);
    const {data:gl} = await supabase.from("config").select("valor").eq("chave","grupo_vip_link").maybeSingle();
    if(gl?.valor) setGrupoLinkAdmin(gl.valor);
  }

  async function aprovar(id){await supabase.from("resgates").update({status:"aprovado"}).eq("id",id);await load();}
  async function recusar(id){await supabase.from("resgates").update({status:"recusado"}).eq("id",id);await load();}
  async function feito(id){await supabase.from("embaixadores").update({ultimo_contato:new Date().toISOString()}).eq("id",id);setFila(f=>f.filter(x=>x.id!==id));}

  async function salvarBanner(e) {
    const file = e.target.files?.[0];
    if(!file) return;
    // Preview local
    const reader = new FileReader();
    reader.onload = ev => setBannerPreview(ev.target.result);
    reader.readAsDataURL(file);
    setUploadando(true); setMsgBanner({text:"",ok:false});
    try {
      // Upload para Supabase Storage
      const ext = file.name.split(".").pop();
      const path = `banners/banner_ativo.${ext}`;
      const {error: upErr} = await supabase.storage.from("assets").upload(path, file, {upsert:true, contentType:file.type});
      if(upErr) { setMsgBanner({text:"Erro no upload: "+upErr.message,ok:false}); setUploadando(false); return; }
      // Pega URL pública
      const {data:urlData} = supabase.storage.from("assets").getPublicUrl(path);
      const url = urlData.publicUrl;
      // Salva na tabela config
      await supabase.from("config").upsert({chave:"banner_ativo",valor:url},{onConflict:"chave"});
      setBanner(url); setBannerPreview(null);
      setMsgBanner({text:"Banner atualizado com sucesso!",ok:true});
    } catch(err) { setMsgBanner({text:"Erro inesperado: "+String(err),ok:false}); }
    setUploadando(false);
  }

  function exportarCSV() {
    const cols = ["Nome","Email","WhatsApp","Instagram","TikTok","Cupom","Status","Nivel","Pix","Cadastro"];
    const lines = [cols.join(",")];
    embs.forEach(function(e) {
      const vals = [
        e.nome, e.email, e.whatsapp,
        e.instagram || "", e.tiktok || "",
        e.cupom, e.status, e.nivel || "embaixador",
        e.pix_key || "",
        new Date(e.criado_em).toLocaleDateString("pt-BR")
      ];
      const row = vals.map(function(v) {
        const s = String(v || "").replace(/"/g, "");
        return s;
      });
      lines.push(row.join(","));
    });
    const csv = lines.join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "embaixadores_sg.csv";
    a.click();
    URL.revokeObjectURL(url);
  }


  async function salvarEdicao() {
    if(!editEmb) return;
    setSavingEdit(true); setMsgEdit({text:"",ok:false});
    const {error} = await supabase.from("embaixadores").update({
      nome: editForm.nome, email: editForm.email,
      whatsapp: editForm.whatsapp, instagram: editForm.instagram,
      tiktok: editForm.tiktok, cupom: editForm.cupom,
      status: editForm.status, nivel: editForm.nivel,
      pix_key: editForm.pix_key
    }).eq("id", editEmb.id);
    if(error) { setMsgEdit({text:"Erro ao salvar: "+error.message,ok:false}); }
    else { setMsgEdit({text:"Salvo com sucesso!",ok:true}); await load(); setEditEmb(null); }
    setSavingEdit(false);
  }

  async function salvarGrupoLink() {
    setSalvandoGrupo(true); setMsgGrupo({text:"",ok:false});
    await supabase.from("config").upsert({chave:"grupo_vip_link",valor:grupoLinkAdmin},{onConflict:"chave"});
    setMsgGrupo({text:"Link salvo com sucesso!",ok:true});
    setSalvandoGrupo(false);
  }

  async function removerBanner() {
    await supabase.from("config").upsert({chave:"banner_ativo",valor:null},{onConflict:"chave"});
    setBanner(""); setBannerPreview(null);
    setMsgBanner({text:"Banner removido.",ok:true});
  }

  if(loading) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout} isAdmin/><Spinner/></div>;

  const filtrados=embs.filter(e=>!busca||[e.nome,e.email,e.cupom].join(" ").toLowerCase().includes(busca.toLowerCase()));

  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header user={user} onLogout={onLogout} isAdmin/>

// -- CHAT PAGE ----------------------------------------------------------------
function PageChat({ embs, onUnread }) {
  const [conversas, setConversas] = React.useState([]);
  const [ativa, setAtiva] = React.useState(null);
  const [msgs, setMsgs] = React.useState([]);
  const [texto, setTexto] = React.useState("");
  const [enviando, setEnviando] = React.useState(false);
  const [loading, setLoading] = React.useState(true);
  const msgsEndRef = React.useRef(null);

  React.useEffect(function() {
    carregarConversas();
    const interval = setInterval(carregarConversas, 15000);
    return function(){ clearInterval(interval); };
  }, []);

  React.useEffect(function() {
    if(ativa) carregarMensagens(ativa.telefone);
  }, [ativa]);

  React.useEffect(function() {
    if(msgsEndRef.current) msgsEndRef.current.scrollIntoView({behavior:"smooth"});
  }, [msgs]);

  async function carregarConversas() {
    const { data } = await supabase
      .from("mensagens_whatsapp")
      .select("telefone,nome_contato,conteudo,direcao,lida,criado_em")
      .order("criado_em", {ascending:false});

    if(!data) { setLoading(false); return; }

    // Group by telefone - last message per contact
    const map = {};
    data.forEach(function(m) {
      if(!map[m.telefone]) map[m.telefone] = {...m, nao_lidas: 0};
      if(!m.lida && m.direcao === "recebida") map[m.telefone].nao_lidas++;
    });

    const lista = Object.values(map).sort(function(a,b){ return new Date(b.criado_em) - new Date(a.criado_em); });
    setConversas(lista);
    const totalNaoLidas = lista.reduce(function(s,c){ return s + c.nao_lidas; }, 0);
    onUnread(totalNaoLidas);
    setLoading(false);
  }

  async function carregarMensagens(telefone) {
    const { data } = await supabase
      .from("mensagens_whatsapp")
      .select("*")
      .eq("telefone", telefone)
      .order("criado_em", {ascending:true});
    setMsgs(data || []);

    // Marcar como lidas
    await supabase.from("mensagens_whatsapp")
      .update({lida:true})
      .eq("telefone", telefone)
      .eq("direcao", "recebida")
      .eq("lida", false);

    await carregarConversas();
  }

  function nomeContato(telefone) {
    const conv = conversas.find(function(c){ return c.telefone === telefone; });
    if(conv?.nome_contato) return conv.nome_contato;
    const emb = embs.find(function(e){ return String(e.whatsapp||"").replace(/[^0-9]/g,"").includes(telefone.slice(-8)); });
    return emb ? emb.nome : telefone;
  }

  async function enviarResposta() {
    if(!texto.trim() || !ativa) return;
    setEnviando(true);
    const fone = ativa.telefone;
    try {
      const res = await fetch(
        "https://graph.facebook.com/v19.0/" + CONFIG.META_PHONE_ID + "/messages",
        {
          method: "POST",
          headers: {"Content-Type":"application/json", Authorization:"Bearer "+CONFIG.META_TOKEN},
          body: JSON.stringify({
            messaging_product: "whatsapp",
            to: fone,
            type: "text",
            text: { body: texto }
          })
        }
      );
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);

      // Save sent message to DB
      await supabase.from("mensagens_whatsapp").insert({
        telefone: fone, direcao: "enviada",
        conteudo: texto, lida: true,
        nome_contato: nomeContato(fone)
      });

      setTexto("");
      await carregarMensagens(fone);
    } catch(e) { alert("Erro ao enviar: "+e.message); }
    setEnviando(false);
  }

  function formatHora(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  }
  function formatData(iso) {
    return new Date(iso).toLocaleDateString("pt-BR");
  }

  if(loading) return <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Carregando conversas...</p>;

  return (
    <div className="fade-in" style={{display:"flex",gap:0,border:"1px solid "+T.g200,height:600,overflow:"hidden"}}>

      {/* Lista de conversas */}
      <div style={{width:280,borderRight:"1px solid "+T.g200,overflowY:"auto",flexShrink:0}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid "+T.g200}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase"}}>Conversas</p>
        </div>
        {conversas.length === 0 && (
          <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,padding:20}}>Nenhuma mensagem recebida ainda.</p>
        )}
        {conversas.map(function(c) {
          const sel = ativa?.telefone === c.telefone;
          return (
            <div key={c.telefone} onClick={function(){ setAtiva(c); }}
              style={{padding:"14px 20px",borderBottom:"1px solid "+T.g200,cursor:"pointer",background:sel?T.g100:"transparent"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                <p style={{fontFamily:T.sans,fontSize:13,fontWeight:sel?600:400}}>{nomeContato(c.telefone)}</p>
                {c.nao_lidas > 0 && (
                  <span style={{background:T.black,color:T.white,fontFamily:T.sans,fontSize:10,borderRadius:10,padding:"2px 7px",flexShrink:0}}>{c.nao_lidas}</span>
                )}
              </div>
              <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                {c.direcao==="enviada"?"Você: ":""}{c.conteudo}
              </p>
              <p style={{fontFamily:T.sans,fontSize:10,color:T.g300,marginTop:4}}>{formatData(c.criado_em)}</p>
            </div>
          );
        })}
      </div>

      {/* Área de mensagens */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {!ativa ? (
          <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Selecione uma conversa</p>
          </div>
        ) : (
          <>
            {/* Header */}
            <div style={{padding:"16px 20px",borderBottom:"1px solid "+T.g200,flexShrink:0}}>

              <p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{ativa.telefone}</p>
            </div>

            {/* Mensagens */}
            <div style={{flex:1,overflowY:"auto",padding:20,display:"flex",flexDirection:"column",gap:10}}>

                      <p style={{fontFamily:T.sans,fontSize:10,color:sent?"#aaa":T.g400,marginTop:4,textAlign:"right"}}>{formatHora(m.criado_em)}</p>

            </div>

            {/* Input */}
            <div style={{padding:16,borderTop:"1px solid "+T.g200,display:"flex",gap:10,flexShrink:0}}>
              <input
                value={texto}
                onChange={function(e){ setTexto(e.target.value); }}
                onKeyDown={function(e){ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); enviarResposta(); } }}
                placeholder="Digite sua mensagem..."
                style={{flex:1,fontFamily:T.sans,fontSize:13,padding:"10px 14px",border:"1px solid "+T.g200,outline:"none"}}
              />
              <button onClick={enviarResposta} disabled={enviando||!texto.trim()}

        )}
      </div>
    </div>
  );
}


// -- PRÉ-ESTREIA PAGE ----------------------------------------------------------
function PagePreEstreia() {
  const [lista, setLista] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [form, setForm] = React.useState({nome:"", telefone:""});
  const [salvando, setSalvando] = React.useState(false);
  const [msg, setMsg] = React.useState({text:"",ok:false});
  const [busca, setBusca] = React.useState("");
  const [csvMode, setCsvMode] = React.useState(false);
  const [csvPreview, setCsvPreview] = React.useState([]);
  const [csvErros, setCsvErros] = React.useState([]);
  const [importando, setImportando] = React.useState(false);
  const [resImport, setResImport] = React.useState(null);
  const setF = function(k,v){ setForm(function(p){ return {...p,[k]:v}; }); };

  function parseCsvEstreia(text) {
    setCsvPreview([]); setCsvErros([]); setResImport(null);
    const lines = text.trim().split(String.fromCharCode(10));
    if(lines.length < 2) { setCsvErros(["Arquivo vazio ou sem dados"]); return; }
    const headers = lines[0].split(",").map(function(h){ return h.trim().replace(/"/g,"").toLowerCase(); });
    if(!headers.includes("nome") || !headers.includes("telefone")) {
      setCsvErros(["Colunas obrigatorias ausentes: nome e/ou telefone"]); return;
    }
    const rows = []; const erros = [];
    for(let i=1; i<lines.length; i++) {
      const vals = lines[i].split(",").map(function(v){ return v.trim().replace(/^"|"$/g,""); });
      const row = {};
      headers.forEach(function(h,idx){ row[h] = vals[idx]||""; });
      if(!row.nome || !row.telefone) { erros.push("Linha "+(i+1)+": nome ou telefone vazio"); }
      else { rows.push(row); }
    }
    setCsvPreview(rows); setCsvErros(erros);
  }

  function handleCsvFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){ parseCsvEstreia(ev.target.result); };
    reader.readAsText(file, "UTF-8");
  }

  async function importarCsv() {
    if(!csvPreview.length) return;
    setImportando(true); setResImport(null);
    let ok=0; const erros=[];
    for(const row of csvPreview) {
      const {error} = await supabase.from("pre_estreia").insert({
        nome: row.nome,
        telefone: row.telefone.replace(/[^0-9]/g,"")
      });
      if(error) { erros.push(row.nome+": "+error.message); } else { ok++; }
    }
    setResImport({ok, erros});
    if(ok>0) load();
    setImportando(false);
  }

  async function load() {
    setLoading(true);
    const {data} = await supabase.from("pre_estreia").select("*").order("criado_em", {ascending:false});
    // Check which phones are already registered as embaixadores
    const {data: embs} = await supabase.from("embaixadores").select("whatsapp");
    const fones = (embs||[]).map(function(e){ return String(e.whatsapp||"").replace(/[^0-9]/g,"").slice(-8); });
    const enriched = (data||[]).map(function(c){
      const fone = String(c.telefone||"").replace(/[^0-9]/g,"").slice(-8);
      return {...c, cadastrado: fones.includes(fone)};
    });
    setLista(enriched);
    setLoading(false);
  }

  React.useEffect(function(){ load(); }, []);

  async function salvar() {
    if(!form.nome||!form.telefone){ setMsg({text:"Preencha nome e telefone.",ok:false}); return; }
    setSalvando(true); setMsg({text:"",ok:false});
    const {error} = await supabase.from("pre_estreia").insert({nome:form.nome, telefone:form.telefone.replace(/[^0-9]/g,"")});
    if(error){ setMsg({text:"Erro: "+error.message,ok:false}); }
    else { setMsg({text:"Contato adicionado!",ok:true}); setForm({nome:"",telefone:""}); load(); }
    setSalvando(false);
  }

  async function remover(id) {
    if(!confirm("Remover este contato?")) return;
    await supabase.from("pre_estreia").delete().eq("id",id);
    load();
  }

  const filtrada = lista.filter(function(c){
    if(!busca) return true;
    return c.nome.toLowerCase().includes(busca.toLowerCase()) || c.telefone.includes(busca);
  });

  const totalDisparos = lista.reduce(function(s,c){ return s+(c.disparos||0); },0);
  const totalCadastrados = lista.filter(function(c){ return c.cadastrado; }).length;

  return (

      <h2 style={{fontFamily:T.serif,fontSize:32,fontWeight:300,marginBottom:8}}>Pré-estreia</h2>
      <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,marginBottom:32}}>Clientes selecionados para convite antecipado ao programa</p>

      {/* Stats */}

          return (
            <button key={v} onClick={function(){setCsvMode(v==="csv");setCsvPreview([]);setCsvErros([]);setResImport(null);setMsg({text:"",ok:false});}}

              {l}
            </button>

        })}
      </div>

      {/* Formulário manual */}

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr auto",gap:12,alignItems:"end"}}>

            <Input label="Telefone (WhatsApp)" value={form.telefone} onChange={function(e){setF("telefone",e.target.value);}} placeholder="11999998888"/>
            <button onClick={salvar} disabled={salvando}

// -- IMPORTAR PAGE -------------------------------------------------------------
function PageImportar({ onImported }) {
  const [modo, setModo] = React.useState("csv"); // "csv" | "manual"
  const [csvData, setCsvData] = React.useState([]);
  const [csvErros, setCsvErros] = React.useState([]);
  const [importando, setImportando] = React.useState(false);
  const [resultados, setResultados] = React.useState(null);
  const [manual, setManual] = React.useState({nome:"",email:"",cpf:"",whatsapp:"",instagram:"",tiktok:"",cupom:"",nivel:"embaixador",status:"ativo"});
  const [salvandoManual, setSalvandoManual] = React.useState(false);
  const [msgManual, setMsgManual] = React.useState({text:"",ok:false});
  const setM = function(k,v){ setManual(function(p){return {...p,[k]:v};}); };

  function parseCsv(text) {
    const lines = text.trim().split("\n");
    if(lines.length < 2) { setCsvErros(["Arquivo vazio ou sem dados"]); return; }
    const headers = lines[0].split(",").map(function(h){ return h.trim().replace(/"/g,"").toLowerCase(); });
    const required = ["nome","email","whatsapp","cupom"];
    const missing = required.filter(function(r){ return !headers.includes(r); });
    if(missing.length) { setCsvErros(["Colunas obrigatórias ausentes: "+missing.join(", ")]); return; }

    const rows = []; const erros = [];
    for(let i=1; i<lines.length; i++) {
      const vals = lines[i].split(",").map(function(v){ return v.trim().replace(/^"|"$/g,""); });
      const row = {};
      headers.forEach(function(h,idx){ row[h] = vals[idx]||""; });
      if(!row.nome||!row.email||!row.whatsapp||!row.cupom) {
        erros.push("Linha "+(i+1)+": dados obrigatórios faltando");
      } else {
        rows.push(row);
      }
    }
    setCsvData(rows); setCsvErros(erros);
  }

  function handleFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    setCsvData([]); setCsvErros([]); setResultados(null);
    const reader = new FileReader();
    reader.onload = function(ev){ parseCsv(ev.target.result); };
    reader.readAsText(file, "UTF-8");
  }

  async function importarCsv() {
    if(!csvData.length) return;
    setImportando(true); setResultados(null);
    let ok=0, erros=[];
    for(const row of csvData) {
      const {error} = await supabase.from("embaixadores").insert({
        nome: row.nome, email: row.email, cpf: row.cpf||"",
        whatsapp: row.whatsapp, instagram: row.instagram||"",
        tiktok: row.tiktok||"", cupom: row.cupom.toUpperCase(),
        nivel: row.nivel||"embaixador", status: row.status||"ativo",
        pix_key: row.pix_key||""
      });
      if(error) { erros.push(row.email+": "+error.message); }
      else { ok++; }
    }
    setResultados({ok, erros});
    if(ok>0) onImported();
    setImportando(false);
  }

  async function salvarManual() {
    if(!manual.nome||!manual.email||!manual.whatsapp||!manual.cupom) {
      setMsgManual({text:"Preencha nome, email, WhatsApp e cupom.",ok:false}); return;
    }
    setSalvandoManual(true); setMsgManual({text:"",ok:false});
    const {error} = await supabase.from("embaixadores").insert({
      nome:manual.nome, email:manual.email, cpf:manual.cpf||"",
      whatsapp:manual.whatsapp, instagram:manual.instagram||"",
      tiktok:manual.tiktok||"", cupom:manual.cupom.toUpperCase(),
      nivel:manual.nivel, status:manual.status, pix_key:""
    });
    if(error) { setMsgManual({text:"Erro: "+error.message,ok:false}); }
    else {
      setMsgManual({text:"Embaixador cadastrado com sucesso!",ok:true});
      setManual({nome:"",email:"",cpf:"",whatsapp:"",instagram:"",tiktok:"",cupom:"",nivel:"embaixador",status:"ativo"});
      onImported();
    }
    setSalvandoManual(false);
  }

  return (
    <div className="fade-in" style={{maxWidth:640}}>
      <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",color:T.g400,textTransform:"uppercase",marginBottom:4}}>Cadastro</p>
      <h2 style={{fontFamily:T.serif,fontSize:32,fontWeight:300,marginBottom:32}}>Importar embaixadores</h2>

      {/* Toggle modo */}
      <div style={{display:"flex",gap:0,marginBottom:40,borderBottom:"1px solid "+T.g200}}>
        {[["csv","Importar CSV"],["manual","Adicionar manual"]].map(function(arr){
          const v=arr[0],l=arr[1];
          return (
            <button key={v} onClick={function(){setModo(v);setResultados(null);setMsgManual({text:"",ok:false});}}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"12px 24px",background:"transparent",border:"none",borderBottom:"2px solid "+(modo===v?T.black:"transparent"),color:modo===v?T.black:T.g400,cursor:"pointer"}}>
              {l}
            </button>
          );
        })}
      </div>

      {/* -- CSV -- */}
      {modo==="csv" && (
        <div>
          <div style={{border:"2px dashed "+T.g200,padding:32,textAlign:"center",marginBottom:24}}>
            <p style={{fontFamily:T.sans,fontSize:13,marginBottom:16,color:T.g400}}>Selecione um arquivo CSV com as colunas:</p>
            <p style={{fontFamily:T.sans,fontSize:11,color:T.black,marginBottom:20,letterSpacing:"0.05em"}}>
              nome*, email*, cpf, whatsapp*, instagram, tiktok, cupom*, nivel, status, pix_key
            </p>
            <input type="file" accept=".csv" onChange={handleFile}
              style={{fontFamily:T.sans,fontSize:12,cursor:"pointer"}}/>
          </div>

          {csvErros.length>0 && (
            <div style={{background:"#fff0f0",border:"1px solid #fcc",padding:16,marginBottom:16}}>
              {csvErros.map(function(e,i){ return <p key={i} style={{fontFamily:T.sans,fontSize:12,color:"#c00",marginBottom:4}}>{e}</p>; })}
            </div>
          )}

          {csvData.length>0 && (
            <div style={{marginBottom:24}}>
              <p style={{fontFamily:T.sans,fontSize:12,color:T.g400,marginBottom:12}}>{csvData.length} linha{csvData.length!==1?"s":""} prontas para importar</p>

                      <span style={{flex:2}}>{r.nome}</span>
                      <span style={{flex:3,color:T.g400}}>{r.email}</span>
                      <span style={{flex:1,fontWeight:600}}>{r.cupom}</span>
                    </div>
                  );
                })}
                {csvData.length>5 && <p style={{padding:"8px 16px",fontFamily:T.sans,fontSize:11,color:T.g400}}>+{csvData.length-5} mais...</p>}
              </div>
              <button onClick={importarCsv} disabled={importando}
                style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 32px",background:importando?T.g200:T.black,color:T.white,border:"none",cursor:importando?"not-allowed":"pointer",marginTop:16}}>
                {importando ? "Importando..." : "Importar "+csvData.length+" embaixadores"}

          {resultados && (

                {resultados.ok} importado{resultados.ok!==1?"s":""} com sucesso

            <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginBottom:12}}>Baixar modelo de planilha</p>
            <button onClick={function(){
              const header = "nome,email,cpf,whatsapp,instagram,tiktok,cupom,nivel,status,pix_key";
