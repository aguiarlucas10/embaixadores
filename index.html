<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clientes Embaixadores — Saint Germain</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Questrial&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Questrial', sans-serif; background: #fff; color: #000; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
    .stagger > * { opacity:0; animation: fadeUp 0.5s ease forwards; }
    .stagger > *:nth-child(1) { animation-delay:0.04s; }
    .stagger > *:nth-child(2) { animation-delay:0.10s; }
    .stagger > *:nth-child(3) { animation-delay:0.16s; }
    .stagger > *:nth-child(4) { animation-delay:0.22s; }
    .stagger > *:nth-child(5) { animation-delay:0.28s; }
    .stagger > *:nth-child(6) { animation-delay:0.34s; }
    .sg-input:focus { border-bottom: 2px solid #000 !important; }
    .sg-btn-primary:hover:not(:disabled) { opacity: 0.85; }
    .sg-btn-secondary:hover { background: #000 !important; color: #fff !important; }
    .sg-btn-ghost:hover { color: #000 !important; }
    .sg-tab:hover { color: #000 !important; }
    input[type=checkbox] { accent-color: #000; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #fff; }
    ::-webkit-scrollbar-thumb { background: #d0d0d0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── CONFIG ──────────────────────────────────────────────────────────────────
const CONFIG = {
  SUPABASE_URL:        "https://fsfqnshkfwnfeswwdmxg.supabase.co",
  SUPABASE_ANON_KEY:   "sb_secret_shWt05xFU7qhIQWfOcEvLQ_KQplw4Au",
  NUVEMSHOP_USER_ID:   "1116055",
  NUVEMSHOP_TOKEN:     "803dbce287de76eb31d88c26c30e60c72126bb22",
  COMISSAO_PCT:        0.15,
  JANELA_DEVOLUCAO:    7,
  ADMIN_EMAILS:        ["admin@saintgermain.com.br"],
};

const supabase = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);

// ── NUVEMSHOP API via Supabase Edge Function (proxy) ─────────────────────────
// As chamadas vão para: {SUPABASE_URL}/functions/v1/bright-api?action=...
// Isso evita bloqueio de CORS ao chamar a API da Nuvemshop direto do browser.
const NS = {
  proxy: `${CONFIG.SUPABASE_URL}/functions/v1/bright-api`,
  h: { "Content-Type":"application/json", "Authorization":`Bearer ${CONFIG.SUPABASE_ANON_KEY}` },

  async ordersByEmail(email) {
    try {
      const r = await fetch(`${this.proxy}?action=orders_by_email&email=${encodeURIComponent(email)}`, { headers: this.h });
      return r.ok ? r.json() : [];
    } catch { return []; }
  },

  async ordersByCoupon(code) {
    try {
      const r = await fetch(`${this.proxy}?action=orders_by_coupon&coupon=${encodeURIComponent(code)}`, { headers: this.h });
      return r.ok ? r.json() : [];
    } catch { return []; }
  },

  async createCoupon(code) {
    try {
      const r = await fetch(`${this.proxy}?action=create_coupon`, {
        method: "POST",
        headers: this.h,
        body: JSON.stringify({ code, percentage: CONFIG.COMISSAO_PCT * 100 }),
      });
      const data = await r.json();
      console.log("createCoupon response:", JSON.stringify(data));
      if (data.status === 201 || data.ok) return { ok: true };
      if (data.status === 422) return { ok: false, duplicate: true };
      return { ok: false };
    } catch(e) { console.error("createCoupon error:", String(e)); return { ok: false }; }
  },
};

// ── HELPERS ──────────────────────────────────────────────────────────────────
const gerarCupomBase = n => "SG" + n.trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^A-Z0-9]/g,"").slice(0,10);
const gerarCupom = (n, sufixo="") => {
  const base = gerarCupomBase(n);
  if (!sufixo) return base;
  // Com sufixo: encurta a base para caber o número (max 12 chars total)
  return base.slice(0, 12 - String(sufixo).length) + sufixo;
};
const brl = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fmt = s => new Date(s).toLocaleDateString("pt-BR");
const diasPassados = (d,n) => (Date.now()-new Date(d).getTime())/86400000>=n;

// ── DESIGN TOKENS ────────────────────────────────────────────────────────────
const T = {
  serif: "'Cormorant Garamond', serif",
  sans:  "'Questrial', sans-serif",
  black: "#000",
  white: "#fff",
  g100: "#f5f5f5",
  g200: "#e8e8e8",
  g300: "#d0d0d0",
  g400: "#a0a0a0",
  g500: "#707070",
  g600: "#404040",
};

// ── ATOMS ────────────────────────────────────────────────────────────────────

function Logo({ sub=true }) {
  return (
    <div>
      <div style={{fontFamily:T.sans,fontSize:13,letterSpacing:"0.25em",textTransform:"uppercase",color:T.black}}>Saint Germain</div>
      {sub && <div style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:T.g400,marginTop:1}}>Clientes Embaixadores</div>}
    </div>
  );
}

function Header({ user, onLogout, isAdmin=false }) {
  return (
    <header style={{borderBottom:`1px solid ${T.black}`,padding:"0 32px",height:64,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:T.white,zIndex:100}}>
      <Logo/>
      <div style={{display:"flex",alignItems:"center",gap:20}}>
        {isAdmin && <span style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",border:`1px solid ${T.black}`,padding:"3px 8px"}}>Admin</span>}
        {user && <button className="sg-btn-ghost" onClick={onLogout} style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",background:"none",border:"none",cursor:"pointer",color:T.g400,transition:"color 0.15s"}}>Sair</button>}
      </div>
    </header>
  );
}

function Input({ label, value, onChange, type="text", placeholder="", onKeyDown }) {
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      <label style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.18em",textTransform:"uppercase",color:T.g600,fontWeight:500}}>{label}</label>
      <input className="sg-input" type={type} value={value} onChange={onChange} placeholder={placeholder} onKeyDown={onKeyDown}
        style={{fontFamily:T.sans,fontSize:15,border:"none",borderBottom:`1px solid ${T.black}`,padding:"10px 0",outline:"none",background:"transparent",color:T.black,width:"100%",borderRadius:0,transition:"border-bottom 0.15s"}}/>
    </div>
  );
}

function BtnPrimary({ children, onClick, loading, style:sx={} }) {
  return (
    <button className="sg-btn-primary" onClick={onClick} disabled={loading}
      style={{fontFamily:T.sans,fontSize:12,letterSpacing:"0.2em",textTransform:"uppercase",background:T.black,color:T.white,border:"none",padding:"16px 32px",cursor:"pointer",width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"opacity 0.2s",...sx}}>
      {loading ? <span style={{width:14,height:14,border:"1.5px solid #fff",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/> : children}
    </button>
  );
}

function BtnSecondary({ children, onClick, style:sx={} }) {
  return (
    <button className="sg-btn-secondary" onClick={onClick}
      style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",background:"transparent",color:T.black,border:`1px solid ${T.black}`,padding:"12px 24px",cursor:"pointer",display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all 0.15s",...sx}}>
      {children}
    </button>
  );
}

function BtnGhost({ children, onClick, style:sx={} }) {
  return (
    <button className="sg-btn-ghost" onClick={onClick}
      style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",background:"none",border:"none",cursor:"pointer",color:T.g400,transition:"color 0.15s",...sx}}>
      {children}
    </button>
  );
}

function Badge({ text, color=T.black }) {
  return <span style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",padding:"3px 8px",border:`1px solid ${color}`,color,display:"inline-block"}}>{text}</span>;
}

function Alert({ msg, ok=false }) {
  if (!msg) return null;
  return <div style={{borderLeft:`2px solid ${T.black}`,paddingLeft:12,fontFamily:T.sans,fontSize:12,color:T.g600,lineHeight:1.7}}>{msg}</div>;
}

function Spinner() {
  return <div style={{display:"flex",justifyContent:"center",alignItems:"center",minHeight:240}}><div style={{width:18,height:18,border:"1.5px solid #000",borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/></div>;
}

function Row({ left, right }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`1px solid ${T.g100}`,padding:"14px 0"}}>
      {left}{right}
    </div>
  );
}

function StatGrid({ items, cols=2 }) {
  return (
    <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:"1px",background:T.g200,marginBottom:40}}>
      {items.map(([v,l],i)=>(
        <div key={i} style={{background:T.white,padding:"20px 16px"}}>
          <div style={{fontFamily:T.serif,fontSize:30,fontWeight:400,color:T.black,lineHeight:1}}>{v}</div>
          <div style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:T.g400,marginTop:5}}>{l}</div>
        </div>
      ))}
    </div>
  );
}

function Tabs({ tabs, labels, active, onChange }) {
  return (
    <div style={{display:"flex",borderBottom:`1px solid ${T.black}`,marginBottom:32}}>
      {tabs.map(t=>(
        <button key={t} className="sg-tab" onClick={()=>onChange(t)}
          style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.18em",textTransform:"uppercase",padding:"12px 20px",background:"transparent",border:"none",cursor:"pointer",borderBottom:active===t?"2px solid #000":"2px solid transparent",color:active===t?T.black:T.g400,marginBottom:-1,transition:"color 0.15s"}}>
          {labels[t]}
        </button>
      ))}
    </div>
  );
}

function TextLink({ children, onClick }) {
  return <button onClick={onClick} style={{background:"none",border:"none",cursor:"pointer",fontFamily:T.sans,fontSize:11,textDecoration:"underline",color:T.black}}>{children}</button>;
}

// ── SPLIT LAYOUT ─────────────────────────────────────────────────────────────
function SplitLayout({ left, right }) {
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",minHeight:"calc(100vh - 64px)"}}>
      <div style={{background:T.black,padding:"72px 56px",display:"flex",flexDirection:"column",justifyContent:"space-between"}}>{left}</div>
      <div style={{padding:"72px 56px",overflowY:"auto"}}>{right}</div>
    </div>
  );
}

// ── PAGE: CADASTRO ──────────────────────────────────────────────────────────
function PageCadastro({ onNavigate }) {
  const [f, setF] = React.useState({nome:"",email:"",cpf:"",whatsapp:"",instagram:"",tiktok:""});
  const [aceite, setAceite] = React.useState(false);
  const [etapa, setEtapa] = React.useState("form"); // "form" | "cupom" | "sucesso"
  const [opcoesCupom, setOpcoesCupom] = React.useState([]);
  const [cupomEscolhido, setCupomEscolhido] = React.useState("");
  const [cupomFinal, setCupomFinal] = React.useState("");
  const [senha, setSenha] = React.useState("");
  const [senhaConfirm, setSenhaConfirm] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [loadingFinalizar, setLoadingFinalizar] = React.useState(false);
  const [loadingAcesso, setLoadingAcesso] = React.useState(false);
  const [err, setErr] = React.useState("");
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  // Gera opções de cupom a partir do nome
  function gerarOpcoes(nome) {
    const base = gerarCupomBase(nome);
    const nomePartes = nome.trim().toUpperCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^A-Z0-9 ]/g,"").split(" ").filter(Boolean);
    const primeiro = nomePartes[0] || "";
    const ultimo = nomePartes[nomePartes.length - 1] || "";
    const opcoes = new Set();
    opcoes.add(base); // SGLUCASAGUIA
    if (primeiro) opcoes.add(("SG" + primeiro).slice(0,12)); // SGLUCAS
    if (ultimo && ultimo !== primeiro) opcoes.add(("SG" + ultimo).slice(0,12)); // SGAGUIA
    if (primeiro && ultimo && primeiro !== ultimo) opcoes.add(("SG" + primeiro + ultimo).slice(0,12)); // SGLUCASAGUIA (já tem)
    if (primeiro) opcoes.add(("SG" + primeiro + new Date().getFullYear().toString().slice(2)).slice(0,12)); // SGLUCAS26
    return [...opcoes].slice(0,4);
  }

  // Etapa final: cria conta no Supabase Auth e vai para o painel
  async function criarContaEAcessar() {
    setErr("");
    if (!senha || senha.length < 6) { setErr("A senha deve ter pelo menos 6 caracteres."); return; }
    if (senha !== senhaConfirm) { setErr("As senhas não conferem."); return; }
    setLoadingAcesso(true);
    try {
      const { error: signUpErr } = await supabase.auth.signUp({ email: f.email, password: senha });
      if (signUpErr && !signUpErr.message.includes("already registered")) {
        setErr("Erro ao criar acesso: " + signUpErr.message);
        setLoadingAcesso(false); return;
      }
      // Se já registrado, tenta login direto
      const { error: signInErr } = await supabase.auth.signInWithPassword({ email: f.email, password: senha });
      if (signInErr) { setErr("Erro ao acessar. Tente novamente."); setLoadingAcesso(false); return; }
      onNavigate("painel");
    } catch { setErr("Erro inesperado. Tente novamente."); }
    setLoadingAcesso(false);
  }

  // Etapa 1: valida formulário e elegibilidade, mostra opções de cupom
  async function avancarParaCupom() {
    setErr("");
    if (!f.nome||!f.email||!f.cpf||!f.whatsapp) { setErr("Preencha todos os campos obrigatórios."); return; }
    if (!aceite) { setErr("Aceite os termos para continuar."); return; }
    setLoading(true);
    try {
      const {data:ex} = await supabase.from("embaixadores").select("id").eq("email",f.email).single();
      if (ex) { setErr("Este e-mail já está cadastrado."); setLoading(false); return; }
      const pedidos = await NS.ordersByEmail(f.email);
      const pedidosPagos = (pedidos||[]).filter(p => p.payment_status === "paid");
      if (!pedidosPagos.length) { setErr("Não encontramos compras confirmadas associadas a este e-mail. É necessário ter ao menos uma compra paga na Saint Germain para participar."); setLoading(false); return; }
      const opcoes = gerarOpcoes(f.nome);
      setOpcoesCupom(opcoes);
      setCupomEscolhido(opcoes[0]);
      setEtapa("cupom");
    } catch { setErr("Erro inesperado. Tente novamente."); }
    setLoading(false);
  }

  // Etapa 2: cria o cupom escolhido e salva no Supabase
  async function finalizar() {
    setErr(""); setLoadingFinalizar(true);
    try {
      // Tenta criar o cupom; se duplicado, adiciona sufixo
      let cod = cupomEscolhido;
      let criado = await NS.createCoupon(cod);
      if (!criado.ok && criado.duplicate) {
        for (let i = 2; i <= 9; i++) {
          cod = cupomEscolhido.slice(0, 10) + i;
          criado = await NS.createCoupon(cod);
          if (criado.ok) break;
          if (!criado.duplicate) break;
        }
      }
      if (!criado || !criado.ok) { setErr("Este cupom já está em uso. Escolha outra opção."); setLoadingFinalizar(false); return; }

      const {error:dbErr} = await supabase.from("embaixadores").insert({
        nome:f.nome, email:f.email, cpf:f.cpf, whatsapp:f.whatsapp,
        instagram:f.instagram, tiktok:f.tiktok, cupom:cod, status:"ativo",
        nivel:"embaixador", comissao_pct:CONFIG.COMISSAO_PCT,
        aceite_termos_em:new Date().toISOString(), criado_em:new Date().toISOString()
      });
      if (dbErr) { setErr("Erro ao salvar cadastro. Tente novamente."); setLoadingFinalizar(false); return; }
      setCupomFinal(cod);
      setEtapa("sucesso");
    } catch { setErr("Erro inesperado. Tente novamente."); }
    setLoadingFinalizar(false);
  }

  // ── TELA SUCESSO + CRIAR SENHA ───────────────────────────────────────────
  if (etapa === "sucesso") return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header/>
      <div style={{maxWidth:480,margin:"0 auto",padding:"72px 24px"}} className="stagger">
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g500,marginBottom:32}}>Bem-vindo ao time</p>
        <h1 style={{fontFamily:T.serif,fontSize:48,fontWeight:300,lineHeight:1.1,marginBottom:32}}>Você agora é<br/>Embaixador<br/><em>Saint Germain.</em></h1>
        <div style={{background:T.black,padding:"24px 32px",display:"flex",flexDirection:"column",alignItems:"center",gap:6,marginBottom:40}}>
          <span style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:T.g400}}>Seu cupom exclusivo</span>
          <span style={{fontFamily:T.sans,fontSize:30,letterSpacing:"0.25em",color:T.white}}>{cupomFinal}</span>
          <span style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",color:T.g500,marginTop:2}}>{(CONFIG.COMISSAO_PCT*100).toFixed(0)}% desconto · {(CONFIG.COMISSAO_PCT*100).toFixed(0)}% comissão por venda</span>
        </div>
        <div style={{borderTop:`1px solid ${T.g200}`,paddingTop:32,marginBottom:32}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:24}}>Crie sua senha de acesso</p>
          <div style={{display:"flex",flexDirection:"column",gap:24,marginBottom:24}}>
            <Input label="Senha *" type="password" value={senha} onChange={e=>setSenha(e.target.value)} placeholder="Mínimo 6 caracteres"/>
            <Input label="Confirmar senha *" type="password" value={senhaConfirm} onChange={e=>setSenhaConfirm(e.target.value)} onKeyDown={e=>e.key==="Enter"&&criarContaEAcessar()}/>
          </div>
          {err && <div style={{marginBottom:24}}><Alert msg={err}/></div>}
          <BtnPrimary onClick={criarContaEAcessar} loading={loadingAcesso}>Acessar meu painel</BtnPrimary>
        </div>
        <p style={{fontFamily:T.sans,fontSize:12,color:T.g400,lineHeight:1.8}}>Em breve você receberá uma mensagem com os detalhes do programa e acesso ao grupo exclusivo.</p>
      </div>
    </div>
  );

  // ── TELA ESCOLHA DO CUPOM ────────────────────────────────────────────────
  if (etapa === "cupom") return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header/>
      <div style={{maxWidth:520,margin:"0 auto",padding:"72px 24px"}} className="stagger">
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g500,marginBottom:12}}>Quase lá</p>
        <h1 style={{fontFamily:T.serif,fontSize:42,fontWeight:300,lineHeight:1.1,marginBottom:12}}>Escolha seu<br/><em>cupom exclusivo.</em></h1>
        <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,lineHeight:1.8,marginBottom:40}}>Este será o código que seus seguidores usam para ganhar desconto — e você ganha comissão em cada venda.</p>

        <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:40}}>
          {opcoesCupom.map(op => (
            <button key={op} onClick={()=>setCupomEscolhido(op)}
              style={{
                fontFamily:T.sans, fontSize:18, letterSpacing:"0.22em", textTransform:"uppercase",
                padding:"20px 24px", border:`2px solid ${cupomEscolhido===op?T.black:T.g200}`,
                background:cupomEscolhido===op?T.black:T.white,
                color:cupomEscolhido===op?T.white:T.black,
                cursor:"pointer", textAlign:"left", transition:"all 0.15s",
                display:"flex", alignItems:"center", justifyContent:"space-between"
              }}>
              <span>{op}</span>
              {cupomEscolhido===op && <span style={{fontSize:10,letterSpacing:"0.15em",opacity:0.7}}>SELECIONADO</span>}
            </button>
          ))}
        </div>

        {err && <div style={{marginBottom:24}}><Alert msg={err}/></div>}

        <BtnPrimary onClick={finalizar} loading={loadingFinalizar}>Confirmar e entrar no programa</BtnPrimary>
        <button onClick={()=>{setEtapa("form");setErr("");}}
          style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",background:"none",border:"none",cursor:"pointer",color:T.g400,marginTop:16,width:"100%",textAlign:"center"}}>
          ← Voltar
        </button>
      </div>
    </div>
  );

  // ── TELA FORMULÁRIO ──────────────────────────────────────────────────────
  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header/>
      <SplitLayout
        left={
          <div className="stagger">
            <div>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g500,marginBottom:40}}>Clientes Embaixadores</p>
              <h1 style={{fontFamily:T.serif,fontSize:56,fontWeight:400,color:T.white,lineHeight:1.08,marginBottom:32}}>Faça parte<br/>de algo<br/><em>exclusivo.</em></h1>
              <p style={{fontFamily:T.sans,fontSize:14,color:T.g400,lineHeight:1.9,maxWidth:300}}>Um convite para clientes que já fazem parte da história da Saint Germain.</p>
            </div>
            <p style={{fontFamily:T.serif,fontSize:13,color:T.g600,letterSpacing:"0.1em",fontStyle:"italic"}}>Saint Germain — Est. Brasil</p>
          </div>
        }
        right={
          <div className="stagger">
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:48}}>Cadastre-se</p>
            <div style={{display:"flex",flexDirection:"column",gap:28,marginBottom:40}}>
              <Input label="Nome completo *" value={f.nome} onChange={e=>set("nome",e.target.value)}/>
              <Input label="E-mail *" type="email" value={f.email} onChange={e=>set("email",e.target.value)} placeholder="O mesmo utilizado na loja"/>
              <Input label="CPF *" value={f.cpf} onChange={e=>set("cpf",e.target.value)}/>
              <Input label="WhatsApp *" value={f.whatsapp} onChange={e=>set("whatsapp",e.target.value)}/>
              <Input label="Instagram" value={f.instagram} onChange={e=>set("instagram",e.target.value)} placeholder="@"/>
              <Input label="TikTok" value={f.tiktok} onChange={e=>set("tiktok",e.target.value)} placeholder="@"/>
            </div>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:32}}>
              <input type="checkbox" id="t" checked={aceite} onChange={e=>setAceite(e.target.checked)} style={{width:14,height:14,marginTop:2,cursor:"pointer",flexShrink:0}}/>
              <label htmlFor="t" style={{fontFamily:T.sans,fontSize:11,color:T.g500,lineHeight:1.7,cursor:"pointer"}}>Aceito os termos do programa e autorizo o uso da minha imagem em publicações relacionadas ao programa Clientes Embaixadores da Saint Germain.</label>
            </div>
            {err && <div style={{marginBottom:24}}><Alert msg={err}/></div>}
            <BtnPrimary onClick={avancarParaCupom} loading={loading}>Continuar</BtnPrimary>
            <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:24,textAlign:"center"}}>Já é embaixador?{" "}<TextLink onClick={()=>onNavigate("login")}>Acesse seu painel</TextLink></p>
          </div>
        }
      />
    </div>
  );
}

// ── PAGE: LOGIN ───────────────────────────────────────────────────────────────
function PageLogin({ onLogin, onNavigate }) {
  const [email, setEmail] = React.useState("");
  const [senha, setSenha] = React.useState("");
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState("");

  async function submit() {
    setErr(""); setLoading(true);
    const {data,error:e} = await supabase.auth.signInWithPassword({email,password:senha});
    if (e) { setErr("E-mail ou senha incorretos."); setLoading(false); return; }
    onLogin(data.user); setLoading(false);
  }

  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header/>
      <SplitLayout
        left={
          <div className="stagger" style={{display:"flex",flexDirection:"column",justifyContent:"center",height:"100%"}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g500,marginBottom:40}}>Painel do Embaixador</p>
            <h1 style={{fontFamily:T.serif,fontSize:52,fontWeight:300,color:T.white,lineHeight:1.08}}>Bem-vindo<br/><em>de volta.</em></h1>
          </div>
        }
        right={
          <div className="stagger" style={{display:"flex",flexDirection:"column",justifyContent:"center",height:"100%"}}>
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:48}}>Entrar</p>
            <div style={{display:"flex",flexDirection:"column",gap:28,marginBottom:40}}>
              <Input label="E-mail" type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
              <Input label="Senha" type="password" value={senha} onChange={e=>setSenha(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
            </div>
            {err && <div style={{marginBottom:24}}><Alert msg={err}/></div>}
            <BtnPrimary onClick={submit} loading={loading}>Entrar</BtnPrimary>
            <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:24,textAlign:"center"}}>Ainda não é embaixador?{" "}<TextLink onClick={()=>onNavigate("cadastro")}>Cadastre-se</TextLink></p>
          </div>
        }
      />
    </div>
  );
}

// ── PAGE: PAINEL ──────────────────────────────────────────────────────────────
function PagePainel({ user, onLogout }) {
  const [emb, setEmb] = React.useState(null);
  const [cs, setCs] = React.useState([]);
  const [rs, setRs] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState("inicio");
  const [sync, setSync] = React.useState(false);
  const [fResgate, setFResgate] = React.useState({tipo:"credito",pix:""});
  const [msgR, setMsgR] = React.useState({text:"",ok:false});
  const [resgatando, setResgatando] = React.useState(false);

  React.useEffect(()=>{load();},[]);

  async function load() {
    setLoading(true);
    const {data:e} = await supabase.from("embaixadores").select("*").eq("email",user.email).single();
    if (!e){setLoading(false);return;}
    setEmb(e);
    const {data:c} = await supabase.from("comissoes").select("*").eq("embaixador_id",e.id).order("criado_em",{ascending:false});
    setCs(c||[]);
    const {data:r} = await supabase.from("resgates").select("*").eq("embaixador_id",e.id).order("criado_em",{ascending:false});
    setRs(r||[]);
    setLoading(false);
  }

  async function sincronizar() {
    if(!emb)return; setSync(true);
    const pedidos = await NS.ordersByCoupon(emb.cupom);
    for(const p of (pedidos||[])){
      const {data:ex}=await supabase.from("comissoes").select("id").eq("pedido_id",String(p.id)).single();
      if(ex)continue;
      const val=parseFloat(p.total);
      await supabase.from("comissoes").insert({embaixador_id:emb.id,pedido_id:String(p.id),valor_pedido:val,valor_comissao:val*CONFIG.COMISSAO_PCT,status:(p.payment_status==="paid"&&diasPassados(p.created_at,CONFIG.JANELA_DEVOLUCAO))?"confirmada":"pendente",criado_em:p.created_at});
    }
    await load(); setSync(false);
  }

  async function resgatar() {
    const saldo=cs.filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+c.valor_comissao,0);
    if(saldo<=0){setMsgR({text:"Nenhum saldo disponível para resgate.",ok:false});return;}
    if(fResgate.tipo==="pix"&&!fResgate.pix){setMsgR({text:"Informe a chave Pix.",ok:false});return;}
    setResgatando(true);
    await supabase.from("resgates").insert({embaixador_id:emb.id,valor:saldo,tipo:fResgate.tipo,pix_key:fResgate.tipo==="pix"?fResgate.pix:null,status:"solicitado",criado_em:new Date().toISOString()});
    await supabase.from("comissoes").update({resgatada:true}).eq("embaixador_id",emb.id).eq("status","confirmada").is("resgatada",null);
    setMsgR({text:"Resgate solicitado com sucesso. O time entrará em contato em breve.",ok:true});
    await load(); setResgatando(false);
  }

  if(loading) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout}/><Spinner/></div>;
  if(!emb) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout}/><div style={{maxWidth:480,margin:"64px auto",padding:"0 24px"}}><Alert msg="Cadastro não encontrado para este e-mail."/></div></div>;

  const saldoDisp = cs.filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+c.valor_comissao,0);
  const saldoPend = cs.filter(c=>c.status==="pendente").reduce((s,c)=>s+c.valor_comissao,0);
  const bStatus = {confirmada:["#000","Confirmada"],pendente:[T.g400,"Pendente"],paga:["#000","Paga"]};
  const bResgate = {solicitado:[T.g400,"Solicitado"],aprovado:["#000","Aprovado"],pago:["#000","Pago"],recusado:["#c00","Recusado"]};

  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header user={user} onLogout={onLogout}/>
      <div style={{maxWidth:960,margin:"0 auto",padding:"48px 32px 80px"}} className="fade-in">

        {/* Saudação */}
        <div style={{marginBottom:40}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Olá, {emb.nome.split(" ")[0]}</p>
          <h2 style={{fontFamily:T.serif,fontSize:36,fontWeight:300}}>Embaixador Saint Germain</h2>
        </div>

        {/* Cupom */}
        <div style={{background:T.black,padding:"24px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:40}}>
          <div>
            <p style={{fontFamily:T.sans,fontSize:9,letterSpacing:"0.18em",textTransform:"uppercase",color:T.g500,marginBottom:6}}>Seu cupom exclusivo</p>
            <p style={{fontFamily:T.sans,fontSize:28,letterSpacing:"0.22em",color:T.white}}>{emb.cupom}</p>
          </div>
          <button onClick={()=>{navigator.clipboard.writeText(emb.cupom);alert("Cupom copiado!");}}
            style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",background:"transparent",color:T.white,border:"1px solid rgba(255,255,255,0.4)",padding:"10px 20px",cursor:"pointer"}}>
            Copiar
          </button>
        </div>

        {/* Stats */}
        <StatGrid items={[[brl(saldoDisp),"Disponível para resgate"],[brl(saldoPend),"Pendente"],[brl(cs.reduce((s,c)=>s+c.valor_pedido,0)),"Total em vendas"],[brl(cs.reduce((s,c)=>s+c.valor_comissao,0)),"Comissão acumulada"]]} cols={4}/>

        {/* Tabs */}
        <Tabs tabs={["inicio","vendas","resgatar"]} labels={{inicio:"Início",vendas:`Vendas (${cs.length})`,resgatar:"Resgatar"}} active={tab} onChange={setTab}/>

        {/* TAB INÍCIO */}
        {tab==="inicio" && (
          <div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase"}}>Últimas vendas</p>
              <BtnGhost onClick={sincronizar}>{sync?<span style={{width:12,height:12,border:"1.5px solid #a0a0a0",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>:"Sincronizar"}</BtnGhost>
            </div>
            {cs.length===0
              ? <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,paddingTop:16}}>Nenhuma venda registrada. Compartilhe seu cupom para começar.</p>
              : cs.slice(0,5).map(c=>(
                <Row key={c.id}
                  left={<div><p style={{fontFamily:T.sans,fontSize:13}}>Pedido #{c.pedido_id}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>{fmt(c.criado_em)}</p></div>}
                  right={<div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>{brl(c.valor_comissao)}</p><Badge text={bStatus[c.status]?.[1]||c.status} color={bStatus[c.status]?.[0]||T.black}/></div>}
                />
              ))
            }
            {cs.length>5&&<BtnGhost onClick={()=>setTab("vendas")} style={{marginTop:16}}>Ver todas ({cs.length}) →</BtnGhost>}
          </div>
        )}

        {/* TAB VENDAS */}
        {tab==="vendas" && (
          <div className="fade-in">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase"}}>Histórico completo</p>
              <BtnGhost onClick={sincronizar}>{sync?<span style={{width:12,height:12,border:"1.5px solid #a0a0a0",borderTopColor:"transparent",borderRadius:"50%",display:"inline-block",animation:"spin 0.7s linear infinite"}}/>:"Sincronizar"}</BtnGhost>
            </div>
            {cs.length===0
              ? <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,paddingTop:16}}>Nenhuma venda registrada ainda.</p>
              : cs.map(c=>(
                <Row key={c.id}
                  left={<div><p style={{fontFamily:T.sans,fontSize:13}}>Pedido #{c.pedido_id}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>{fmt(c.criado_em)} · Pedido: {brl(c.valor_pedido)}</p></div>}
                  right={<div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>+{brl(c.valor_comissao)}</p><Badge text={bStatus[c.status]?.[1]||c.status} color={bStatus[c.status]?.[0]||T.black}/></div>}
                />
              ))
            }
          </div>
        )}

        {/* TAB RESGATAR */}
        {tab==="resgatar" && (
          <div className="fade-in">
            <div style={{marginBottom:40}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:8}}>Saldo disponível</p>
              <p style={{fontFamily:T.serif,fontSize:64,fontWeight:300,lineHeight:1,marginBottom:4}}>{brl(saldoDisp)}</p>
              {saldoPend>0&&<p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{brl(saldoPend)} pendente — aguardando prazo de devolução</p>}
            </div>
            {saldoDisp>0&&(
              <div style={{maxWidth:400,marginBottom:48}}>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:20}}>Forma de resgate</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",border:`1px solid ${T.black}`,marginBottom:28}}>
                  {[["credito","Crédito na loja"],["pix","Pix"]].map(([val,lbl],i)=>(
                    <button key={val} onClick={()=>setFResgate(p=>({...p,tipo:val}))}
                      style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px",border:"none",borderRight:i===0?`1px solid ${T.black}`:"none",cursor:"pointer",background:fResgate.tipo===val?T.black:T.white,color:fResgate.tipo===val?T.white:T.black,transition:"all 0.15s"}}>
                      {lbl}
                    </button>
                  ))}
                </div>
                {fResgate.tipo==="pix"&&<div style={{marginBottom:28}}><Input label="Chave Pix" value={fResgate.pix} onChange={e=>setFResgate(p=>({...p,pix:e.target.value}))} placeholder="CPF, e-mail, telefone ou chave aleatória"/></div>}
                {msgR.text&&<div style={{marginBottom:24}}><Alert msg={msgR.text} ok={msgR.ok}/></div>}
                <BtnPrimary onClick={resgatar} loading={resgatando}>Solicitar {brl(saldoDisp)}</BtnPrimary>
                <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:12}}>Processado em até 5 dias úteis.</p>
              </div>
            )}
            {rs.length>0&&(
              <div>
                <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:16}}>Histórico de resgates</p>
                {rs.map(r=>(
                  <Row key={r.id}
                    left={<div><p style={{fontFamily:T.sans,fontSize:13}}>{r.tipo==="pix"?"Pix":"Crédito na loja"}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>{fmt(r.criado_em)}</p></div>}
                    right={<div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>{brl(r.valor)}</p><Badge text={bResgate[r.status]?.[1]||r.status} color={bResgate[r.status]?.[0]||T.black}/></div>}
                  />
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── PAGE: ADMIN ───────────────────────────────────────────────────────────────
function PageAdmin({ user, onLogout }) {
  const [embs, setEmbs] = React.useState([]);
  const [ress, setRess] = React.useState([]);
  const [fila, setFila] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [tab, setTab] = React.useState("embaixadores");
  const [busca, setBusca] = React.useState("");

  React.useEffect(()=>{load();},[]);

  async function load() {
    setLoading(true);
    const {data:e}=await supabase.from("embaixadores").select("*, comissoes(valor_comissao,status,resgatada)").order("criado_em",{ascending:false});
    setEmbs(e||[]);
    const {data:r}=await supabase.from("resgates").select("*, embaixadores(nome,email,cupom)").eq("status","solicitado").order("criado_em",{ascending:false});
    setRess(r||[]);
    const ontem=new Date(Date.now()-86400000).toISOString();
    const {data:novos}=await supabase.from("embaixadores").select("id,nome,whatsapp,cupom,criado_em").gte("criado_em",ontem);
    const t30=new Date(Date.now()-30*86400000).toISOString();
    const {data:inat}=await supabase.from("embaixadores").select("id,nome,whatsapp,cupom,ultimo_acesso").lt("ultimo_acesso",t30).eq("status","ativo");
    setFila([...(novos||[]).map(x=>({...x,motivo:"Novo cadastro — boas-vindas",p:"alta"})),...(inat||[]).map(x=>({...x,motivo:"Inativo +30d — reengajar",p:"media"}))]);
    setLoading(false);
  }

  async function aprovar(id){await supabase.from("resgates").update({status:"aprovado"}).eq("id",id);await load();}
  async function recusar(id){await supabase.from("resgates").update({status:"recusado"}).eq("id",id);await load();}
  async function feito(id){await supabase.from("embaixadores").update({ultimo_contato:new Date().toISOString()}).eq("id",id);setFila(f=>f.filter(x=>x.id!==id));}

  if(loading) return <div style={{minHeight:"100vh"}}><Header user={user} onLogout={onLogout} isAdmin/><Spinner/></div>;

  const filtrados=embs.filter(e=>!busca||[e.nome,e.email,e.cupom].join(" ").toLowerCase().includes(busca.toLowerCase()));

  return (
    <div style={{minHeight:"100vh",background:T.white}}>
      <Header user={user} onLogout={onLogout} isAdmin/>
      <div style={{maxWidth:960,margin:"0 auto",padding:"48px 32px 80px"}} className="fade-in">

        <div style={{marginBottom:40}}>
          <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Gestão</p>
          <h2 style={{fontFamily:T.serif,fontSize:36,fontWeight:300}}>Clientes Embaixadores</h2>
        </div>

        <StatGrid items={[[embs.filter(e=>e.status==="ativo").length,"Ativos"],[ress.length,"Resgates pendentes"],[fila.length,"Fila de contato"]]} cols={3}/>

        <Tabs tabs={["embaixadores","resgates","fila"]} labels={{embaixadores:`Embaixadores (${embs.length})`,resgates:`Resgates${ress.length?` (${ress.length})`:""}`,fila:`Fila${fila.length?` (${fila.length})`:""}`}} active={tab} onChange={setTab}/>

        {/* TAB EMBAIXADORES */}
        {tab==="embaixadores"&&(
          <div className="fade-in">
            <div style={{marginBottom:24}}><Input label="Buscar" value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Nome, e-mail ou cupom"/></div>
            {filtrados.length===0?<p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Nenhum resultado.</p>
            :filtrados.map(e=>{
              const total=(e.comissoes||[]).reduce((s,c)=>s+(c.valor_comissao||0),0);
              const saldo=(e.comissoes||[]).filter(c=>c.status==="confirmada"&&!c.resgatada).reduce((s,c)=>s+c.valor_comissao,0);
              return(
                <Row key={e.id}
                  left={<div><p style={{fontFamily:T.sans,fontSize:13,marginBottom:2}}>{e.nome}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{e.email} · {e.whatsapp}</p><span style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.12em",background:T.g100,padding:"2px 8px",display:"inline-block",marginTop:4}}>{e.cupom}</span></div>}
                  right={<div style={{textAlign:"right"}}><p style={{fontFamily:T.serif,fontSize:22,fontWeight:300}}>{brl(total)}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>total · {brl(saldo)} disponível</p></div>}
                />
              );
            })}
          </div>
        )}

        {/* TAB RESGATES */}
        {tab==="resgates"&&(
          <div className="fade-in">
            {ress.length===0?<p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Nenhum resgate pendente.</p>
            :ress.map(r=>(
              <div key={r.id} style={{borderBottom:`1px solid ${T.g200}`,padding:"24px 0"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div>
                    <p style={{fontFamily:T.sans,fontSize:13,marginBottom:2}}>{r.embaixadores?.nome}</p>
                    <p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{r.embaixadores?.email}</p>
                    <p style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginTop:2}}>Solicitado em {fmt(r.criado_em)}</p>
                    {r.tipo==="pix"&&r.pix_key&&<p style={{fontFamily:T.sans,fontSize:12,background:T.g100,padding:"4px 10px",display:"inline-block",marginTop:8,letterSpacing:"0.05em"}}>Pix: {r.pix_key}</p>}
                  </div>
                  <div style={{textAlign:"right",marginLeft:32}}>
                    <p style={{fontFamily:T.serif,fontSize:32,fontWeight:300,marginBottom:8}}>{brl(r.valor)}</p>
                    <Badge text={r.tipo==="pix"?"Pix":"Crédito"}/>
                    <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"flex-end"}}>
                      <BtnPrimary onClick={()=>aprovar(r.id)} style={{width:"auto",padding:"10px 20px",fontSize:10}}>Aprovar</BtnPrimary>
                      <BtnSecondary onClick={()=>recusar(r.id)} style={{padding:"10px 20px",fontSize:10}}>Recusar</BtnSecondary>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* TAB FILA */}
        {tab==="fila"&&(
          <div className="fade-in">
            <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.2em",textTransform:"uppercase",color:T.g400,marginBottom:24}}>Envio manual via WhatsApp</p>
            {fila.length===0?<p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Nenhuma comunicação pendente.</p>
            :fila.map(c=>(
              <Row key={c.id}
                left={<div><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:2}}><p style={{fontFamily:T.sans,fontSize:13}}>{c.nome}</p><Badge text={c.p==="alta"?"Novo":"Inativo"} color={c.p==="alta"?T.black:T.g400}/></div><p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>{c.whatsapp}</p><p style={{fontFamily:T.sans,fontSize:11,color:T.g500,marginTop:2}}>{c.motivo}</p></div>}
                right={<div style={{display:"flex",gap:8,marginLeft:16,flexShrink:0}}>
                  <a href={`https://wa.me/55${(c.whatsapp||"").replace(/\D/g,"")}?text=Oi ${(c.nome||"").split(" ")[0]}!`} target="_blank" rel="noopener noreferrer"><BtnSecondary style={{padding:"10px 16px",fontSize:10}}>Abrir WA</BtnSecondary></a>
                  <BtnGhost onClick={()=>feito(c.id)} style={{fontSize:10}}>Feito ✓</BtnGhost>
                </div>}
              />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = React.useState(()=>window.location.hash.replace("#","")||"cadastro");
  const [user, setUser] = React.useState(null);
  const [checking, setChecking] = React.useState(true);

  React.useEffect(()=>{
    supabase.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  },[]);
  React.useEffect(()=>{window.location.hash=page;},[page]);

  function handleLogin(u){setUser(u);setPage(CONFIG.ADMIN_EMAILS.includes(u.email)?"admin":"painel");}
  async function handleLogout(){await supabase.auth.signOut();setUser(null);setPage("login");}

  if(checking) return <Spinner/>;
  if(page==="cadastro") return <PageCadastro onNavigate={setPage}/>;
  if(page==="login") return <PageLogin onLogin={handleLogin} onNavigate={setPage}/>;
  if(page==="painel") return user?<PagePainel user={user} onLogout={handleLogout}/>:<PageLogin onLogin={handleLogin} onNavigate={setPage}/>;
  if(page==="admin") return user?<PageAdmin user={user} onLogout={handleLogout}/>:<PageLogin onLogin={handleLogin} onNavigate={setPage}/>;
  return <PageCadastro onNavigate={setPage}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
