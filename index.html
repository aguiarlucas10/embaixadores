              ↓ Baixar modelo CSV
            </button>
          </div>
        </div>
      )}

      {/* -- MANUAL -- */}
      {modo==="manual" && (
        <div style={{display:"flex",flexDirection:"column",gap:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <Input label="Nome*" value={manual.nome} onChange={function(e){setM("nome",e.target.value);}}/>
            <Input label="Email*" value={manual.email} onChange={function(e){setM("email",e.target.value);}}/>
            <Input label="CPF" value={manual.cpf} onChange={function(e){setM("cpf",e.target.value);}} placeholder="000.000.000-00"/>
            <Input label="WhatsApp*" value={manual.whatsapp} onChange={function(e){setM("whatsapp",e.target.value);}} placeholder="11999998888"/>
            <Input label="Instagram" value={manual.instagram} onChange={function(e){setM("instagram",e.target.value);}} placeholder="@usuario"/>
            <Input label="TikTok" value={manual.tiktok} onChange={function(e){setM("tiktok",e.target.value);}} placeholder="@usuario"/>
            <Input label="Cupom*" value={manual.cupom} onChange={function(e){setM("cupom",e.target.value.toUpperCase());}} placeholder="SGMARIA"/>
            <div/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
            <div>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400,marginBottom:8}}>Nível</p>
              <select value={manual.nivel} onChange={function(e){setM("nivel",e.target.value);}}
                style={{fontFamily:T.sans,fontSize:13,padding:"10px 12px",border:"1px solid "+T.g200,width:"100%",background:T.white}}>
                <option value="embaixador">Embaixador</option>
                <option value="destaque">Embaixador Destaque</option>
                <option value="influenciador">Influenciador Oficial</option>
              </select>
            </div>
            <div>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400,marginBottom:8}}>Status</p>
              <select value={manual.status} onChange={function(e){setM("status",e.target.value);}}
                style={{fontFamily:T.sans,fontSize:13,padding:"10px 12px",border:"1px solid "+T.g200,width:"100%",background:T.white}}>
                <option value="ativo">Ativo</option>
                <option value="pendente">Pendente</option>
                <option value="inativo">Inativo</option>
              </select>
            </div>
          </div>
          {msgManual.text && <Alert msg={msgManual.text} ok={msgManual.ok}/>}
          <button onClick={salvarManual} disabled={salvandoManual}
            style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 32px",background:salvandoManual?T.g200:T.black,color:T.white,border:"none",cursor:"pointer",alignSelf:"flex-start"}}>
            {salvandoManual ? "Salvando..." : "Cadastrar embaixador"}
          </button>
        </div>
      )}
    </div>
  );
}


// -- WHATSAPP PAGE ------------------------------------------------------------
function PageWhatsApp({ embs }) {
  const [templates, setTemplates] = React.useState([]);
  const [loadingTpl, setLoadingTpl] = React.useState(false);
  const [tplError, setTplError] = React.useState("");
  const [selectedTpl, setSelectedTpl] = React.useState(null);
  const [destino, setDestino] = React.useState("todos");
  const [embSel, setEmbSel] = React.useState([]);
  const [sending, setSending] = React.useState(false);
  const [sendLog, setSendLog] = React.useState([]);
  const [agendando, setAgendando] = React.useState(false);
  const [agendado, setAgendado] = React.useState(null); // {date, time}
  const [agendamentos, setAgendamentos] = React.useState([]);

  React.useEffect(function(){ carregarAgendamentos(); }, []);

  async function carregarAgendamentos() {
    const { data } = await supabase
      .from("agendamentos_disparo")
      .select("*")
      .eq("status","pendente")
      .order("agendado_para", {ascending:true});
    setAgendamentos(data||[]);
  }

  async function salvarAgendamento() {
    if(!selectedTpl) { alert("Selecione um template."); return; }
    if(!agendado || !agendado.date || !agendado.time) { alert("Selecione data e horario."); return; }
    const lista = destinatarios();
    if(!lista.length) { alert("Nenhum destinatario selecionado."); return; }
    const datetime = new Date(agendado.date + "T" + agendado.time + ":00");
    if(datetime <= new Date()) { alert("Selecione uma data e horario futuros."); return; }
    const destinatariosJson = lista.map(function(e){ return {id:e.id, nome:e.nome, whatsapp:e.whatsapp, cupom:e.cupom||"", _estreia:e._estreia||false}; });
    const { error } = await supabase.from("agendamentos_disparo").insert({
      agendado_para: datetime.toISOString(),
      template_name: selectedTpl.name,
      template_language: selectedTpl.language,
      destino: destino,
      destinatarios: destinatariosJson,
      total: lista.length,
      status: "pendente"
    });
    if(error) { alert("Erro ao agendar: " + error.message); return; }
    await carregarAgendamentos();
    setAgendando(false);
    setAgendado(null);
    alert("Disparo agendado para " + datetime.toLocaleString("pt-BR") + " para " + lista.length + " destinatarios.");
  }

  async function cancelarAgendamento(id) {
    if(!confirm("Cancelar este agendamento?")) return;
    await supabase.from("agendamentos_disparo").update({status:"cancelado"}).eq("id",id);
    await carregarAgendamentos();
  }
  const [automacoes, setAutomacoes] = React.useState({
    novo_cadastro: { ativo: false, template: "" },
    marco_atingido: { ativo: false, template: "" },
    resgate_solicitado: { ativo: false, template: "" },
    inativo_30d: { ativo: false, template: "" },
  });
  const [savingAuto, setSavingAuto] = React.useState(false);
  const [msgAuto, setMsgAuto] = React.useState("");

  const autoLabels = {
    novo_cadastro: "Novo cadastro aprovado",
    marco_atingido: "Marco de vendas atingido",
    resgate_solicitado: "Resgate solicitado",
    inativo_30d: "Embaixador inativo há 30 dias",
  };

  React.useEffect(function() {
    carregarTemplates();
    carregarAutomacoes();
  }, []);

  async function carregarTemplates() {
    setLoadingTpl(true); setTplError("");
    try {
      const res = await fetch(
        "https://graph.facebook.com/v19.0/" + CONFIG.META_WABA_ID + "/message_templates?fields=name,status,language,components&limit=50",
        { headers: { Authorization: "Bearer " + CONFIG.META_TOKEN } }
      );
      const data = await res.json();
      if(data.error) { setTplError(data.error.message); setLoadingTpl(false); return; }
      const aprovados = (data.data || []).filter(function(t) { return t.status === "APPROVED"; });
      setTemplates(aprovados);
    } catch(e) { setTplError("Erro ao carregar templates: " + e.message); }
    setLoadingTpl(false);
  }

  async function carregarAutomacoes() {
    const { data } = await supabase.from("config").select("*").eq("chave","whatsapp_automacoes").maybeSingle();
    if(data?.valor) { try { setAutomacoes(JSON.parse(data.valor)); } catch(e){} }
  }

  async function salvarAutomacoes() {
    setSavingAuto(true); setMsgAuto("");
    await supabase.from("config").upsert({chave:"whatsapp_automacoes", valor: JSON.stringify(automacoes)},{onConflict:"chave"});
    setSavingAuto(false); setMsgAuto("Automações salvas!");
    setTimeout(function(){ setMsgAuto(""); }, 3000);
  }

  function tplPreview(tpl) {
    if(!tpl) return "";
    const body = (tpl.components || []).find(function(c){ return c.type === "BODY"; });
    return body ? body.text : "(sem preview)";
  }

  const [listaEstreia, setListaEstreia] = React.useState([]);
  React.useEffect(function(){
    if(destino === "estreia") {
      supabase.from("pre_estreia").select("*").then(function(r){ setListaEstreia(r.data||[]); });
    }
  }, [destino]);

  function destinatarios() {
    if(destino === "todos") return embs.filter(function(e){ return e.status === "ativo"; });
    if(destino === "destaque") return embs.filter(function(e){ return e.nivel === "destaque" || e.nivel === "influenciador"; });
    if(destino === "selecao") return embs.filter(function(e){ return embSel.includes(e.id); });
    if(destino === "estreia") return listaEstreia.map(function(c){ return {id:c.id, nome:c.nome, whatsapp:c.telefone, cupom:"", disparos:c.disparos, _estreia:true}; });
    return [];
  }

  function buildComponents(tpl, emb) {
    // Detect how many variables the template body has
    const body = (tpl.components || []).find(function(c){ return c.type === "BODY"; });
    if(!body || !body.text) return [];
    const matches = body.text.match(/{{[0-9]+}}/g) || [];
    const count = matches.length;
    if(count === 0) return [];

    // Map variable positions to data
    // Convention: {{1}} = nome, {{2}} = link painel, {{3}} = cupom
    const portalUrl = "https://embaixadores.saintgermainbrand.com.br";
    const params = [
      emb.nome || "",
      portalUrl,
      emb.cupom || "",
      emb.instagram || "",
    ];

    const parameters = [];
    for(let i = 0; i < count; i++) {
      parameters.push({ type: "text", text: params[i] || "" });
    }
    return [{ type: "body", parameters }];
  }

  async function disparar() {
    if(!selectedTpl) { alert("Selecione um template."); return; }
    const lista = destinatarios();
    if(!lista.length) { alert("Nenhum destinatário selecionado."); return; }
    if(!confirm("Disparar para " + lista.length + " embaixadores?")) return;
    setSending(true); setSendLog([]);
    for(const emb of lista) {
      const fone = String(emb.whatsapp || "").replace(/[^0-9]/g,"");
      if(!fone) { setSendLog(function(l){ return [...l, {nome:emb.nome,ok:false,msg:"Sem WhatsApp"}]; }); continue; }
      try {
        const res = await fetch(
          "https://graph.facebook.com/v19.0/" + CONFIG.META_PHONE_ID + "/messages",
          {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: "Bearer " + CONFIG.META_TOKEN },
            body: JSON.stringify({
              messaging_product: "whatsapp",
              to: fone.startsWith("55") ? fone : "55" + fone,
              type: "template",
              template: {
                name: selectedTpl.name,
                language: { code: selectedTpl.language },
                components: buildComponents(selectedTpl, emb)
              }
            })
          }
        );
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        setSendLog(function(l){ return [...l, {nome:emb.nome,ok:true,msg:"Enviado"}]; });
        if(emb._estreia) {
          await supabase.from("pre_estreia").update({disparos: (emb.disparos||0)+1}).eq("id", emb.id);
        }
      } catch(e) {
        setSendLog(function(l){ return [...l, {nome:emb.nome,ok:false,msg:e.message}]; });
      }
      await new Promise(function(r){ setTimeout(r, 200); }); // rate limit
    }
    setSending(false);
  }

  return (
    <div className="fade-in" style={{maxWidth:640}}>
      <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",color:T.g400,textTransform:"uppercase",marginBottom:4}}>WhatsApp Business API</p>
      <h2 style={{fontFamily:T.serif,fontSize:32,fontWeight:300,marginBottom:32}}>Disparos</h2>

      {/* -- DISPARO MANUAL -- */}
      <div style={{marginBottom:48}}>
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:20}}>Disparo Manual</p>

        {/* Templates */}
        <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",color:T.g400,textTransform:"uppercase",marginBottom:8}}>Template aprovado</p>
        {loadingTpl && <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Carregando templates...</p>}
        {tplError && <p style={{fontFamily:T.sans,fontSize:13,color:"#c00"}}>{tplError}</p>}
        {!loadingTpl && !tplError && (
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {templates.length === 0 && <p style={{fontFamily:T.sans,fontSize:13,color:T.g400}}>Nenhum template aprovado encontrado.</p>}
            {templates.map(function(t) {
              const sel = selectedTpl?.name === t.name;
              return (
                <div key={t.name} onClick={function(){ setSelectedTpl(t); }}
                  style={{border:"1px solid " + (sel ? T.black : T.g200),padding:"12px 16px",cursor:"pointer",borderRadius:2,background:sel?T.black:T.white}}>
                  <p style={{fontFamily:T.sans,fontSize:12,fontWeight:600,color:sel?T.white:T.black,marginBottom:4}}>{t.name}</p>
                  <p style={{fontFamily:T.sans,fontSize:11,color:sel?"#ccc":T.g400,lineHeight:1.5}}>{tplPreview(t).substring(0,120)}{tplPreview(t).length>120?"...":""}</p>
                </div>
              );
            })}
          </div>
        )}

        {/* Destinatários */}
        <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",color:T.g400,textTransform:"uppercase",marginBottom:8}}>Destinatários</p>
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {[["todos","Todos ativos"],["destaque","Destaque e Influenciadores"],["estreia","Pré-estreia"],["selecao","Seleção manual"]].map(function([v,l]){
            return (
              <button key={v} onClick={function(){ setDestino(v); }}
                style={{fontFamily:T.sans,fontSize:11,padding:"8px 16px",border:"1px solid "+(destino===v?T.black:T.g200),background:destino===v?T.black:T.white,color:destino===v?T.white:T.black,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>
                {l}
              </button>
            );
          })}
        </div>

        {destino === "selecao" && (
          <div style={{border:"1px solid "+T.g200,padding:16,marginBottom:16,maxHeight:200,overflowY:"auto"}}>
            {embs.filter(function(e){ return e.status==="ativo"; }).map(function(e){
              const checked = embSel.includes(e.id);
              return (
                <div key={e.id} onClick={function(){ setEmbSel(function(s){ return checked?s.filter(function(x){return x!==e.id;}):[...s,e.id]; }); }}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",cursor:"pointer",borderBottom:"1px solid "+T.g200}}>
                  <div style={{width:16,height:16,border:"1px solid "+(checked?T.black:T.g300),background:checked?T.black:"transparent",flexShrink:0}}/>
                  <span style={{fontFamily:T.sans,fontSize:12}}>{e.nome}</span>
                  <span style={{fontFamily:T.sans,fontSize:11,color:T.g400,marginLeft:"auto"}}>{e.cupom}</span>
                </div>
              );
            })}
          </div>
        )}

        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <button onClick={disparar} disabled={sending}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 28px",background:sending?T.g200:T.black,color:T.white,border:"none",cursor:sending?"not-allowed":"pointer"}}>
              {sending ? "Enviando..." : "Disparar agora"}
            </button>
            <button onClick={function(){ setAgendando(!agendando); setAgendado(null); }}
              style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 28px",background:"transparent",color:T.black,border:"1px solid "+T.black,cursor:"pointer"}}>
              Agendar
            </button>
            <span style={{fontFamily:T.sans,fontSize:12,color:T.g400}}>
              {destinatarios().length} destinatario{destinatarios().length!==1?"s":""}
            </span>
          </div>

          {agendando && (
            <div style={{border:"1px solid "+T.g200,padding:20,marginBottom:16}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:16}}>Agendar disparo</p>
              <div style={{display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}}>
                <div>
                  <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Data</p>
                  <input type="date"
                    min={new Date().toISOString().split("T")[0]}
                    value={agendado ? agendado.date : ""}
                    onChange={function(e){ setAgendado(function(p){ return {...(p||{}), date:e.target.value}; }); }}
                    style={{fontFamily:T.sans,fontSize:13,padding:"10px 12px",border:"1px solid "+T.g200,background:T.white,cursor:"pointer"}}/>
                </div>
                <div>
                  <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:T.g400,marginBottom:6}}>Horario</p>
                  <input type="time"
                    value={agendado ? agendado.time : ""}
                    onChange={function(e){ setAgendado(function(p){ return {...(p||{}), time:e.target.value}; }); }}
                    style={{fontFamily:T.sans,fontSize:13,padding:"10px 12px",border:"1px solid "+T.g200,background:T.white,cursor:"pointer"}}/>
                </div>
                <button onClick={salvarAgendamento}
                  style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",padding:"10px 20px",background:T.black,color:T.white,border:"none",cursor:"pointer"}}>
                  Confirmar agendamento
                </button>
                <button onClick={function(){ setAgendando(false); setAgendado(null); }}
                  style={{fontFamily:T.sans,fontSize:11,color:T.g400,background:"transparent",border:"none",cursor:"pointer"}}>
                  Cancelar
                </button>
              </div>
            </div>
          )}

          {agendamentos.length > 0 && (
            <div style={{border:"1px solid "+T.g200,padding:20}}>
              <p style={{fontFamily:T.sans,fontSize:10,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:12}}>Agendamentos pendentes</p>
              {agendamentos.map(function(a){
                return (
                  <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid "+T.g200}}>
                    <div>
                      <p style={{fontFamily:T.sans,fontSize:13}}>{new Date(a.datetime).toLocaleString("pt-BR")}</p>
                      <p style={{fontFamily:T.sans,fontSize:11,color:T.g400}}>Template: {a.template} - {a.total} destinatario{a.total!==1?"s":""}</p>
                    </div>
                    <button onClick={function(){ cancelarAgendamento(a.id); }}
                      style={{fontFamily:T.sans,fontSize:11,color:"#c00",background:"transparent",border:"none",cursor:"pointer"}}>
                      Cancelar
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Log */}
        {sendLog.length > 0 && (
          <div style={{border:"1px solid "+T.g200,padding:16,maxHeight:200,overflowY:"auto"}}>
            {sendLog.map(function(l,i){
              return (
                <div key={i} style={{display:"flex",gap:10,padding:"6px 0",borderBottom:"1px solid "+T.g200,fontFamily:T.sans,fontSize:12}}>
                  <span style={{color:l.ok?"#2a7a2a":"#c00",fontWeight:600}}>{l.ok?"✓":"✗"}</span>
                  <span style={{flex:1}}>{l.nome}</span>
                  <span style={{color:T.g400}}>{l.msg}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>

      {/* -- AUTOMAÇÕES -- */}
      <div style={{borderTop:"1px solid "+T.g200,paddingTop:32}}>
        <p style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:600,marginBottom:20}}>Automações</p>
        <p style={{fontFamily:T.sans,fontSize:13,color:T.g400,marginBottom:24,lineHeight:1.6}}>Configure qual template é enviado automaticamente em cada evento. As mensagens são disparadas via Edge Function do Supabase.</p>

        {Object.keys(automacoes).map(function(key) {
          const auto = automacoes[key];
          return (
            <div key={key} style={{borderBottom:"1px solid "+T.g200,padding:"20px 0"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <p style={{fontFamily:T.sans,fontSize:13,fontWeight:600}}>{autoLabels[key]}</p>
                <div onClick={function(){ setAutomacoes(function(a){ return {...a,[key]:{...a[key],ativo:!a[key].ativo}}; }); }}
                  style={{width:40,height:22,background:auto.ativo?T.black:T.g200,borderRadius:11,cursor:"pointer",position:"relative",transition:"background 0.2s"}}>
                  <div style={{position:"absolute",top:3,left:auto.ativo?20:3,width:16,height:16,background:T.white,borderRadius:"50%",transition:"left 0.2s"}}/>
                </div>
              </div>
              {auto.ativo && (
                <select value={auto.template} onChange={function(e){ const v=e.target.value; setAutomacoes(function(a){ return {...a,[key]:{...a[key],template:v}}; }); }}
                  style={{fontFamily:T.sans,fontSize:12,padding:"8px 12px",border:"1px solid "+T.g200,background:T.white,width:"100%",color:auto.template?T.black:T.g400}}>
                  <option value="">Selecionar template...</option>
                  {templates.map(function(t){ return <option key={t.name} value={t.name}>{t.name}</option>; })}
                </select>
              )}
            </div>
          );
        })}

        <div style={{display:"flex",alignItems:"center",gap:16,marginTop:24}}>
          <button onClick={salvarAutomacoes} disabled={savingAuto}
            style={{fontFamily:T.sans,fontSize:11,letterSpacing:"0.15em",textTransform:"uppercase",padding:"14px 32px",background:savingAuto?T.g200:T.black,color:T.white,border:"none",cursor:"pointer"}}>
            {savingAuto ? "Salvando..." : "Salvar automações"}
          </button>
          {msgAuto && <p style={{fontFamily:T.sans,fontSize:13,color:"#2a7a2a"}}>{msgAuto}</p>}
        </div>
      </div>
    </div>
  );
}


// -- APP -----------------------------------------------------------------------
function App() {
  const [page, setPage] = React.useState(()=>window.location.hash.replace("#","")||"cadastro");
  const [user, setUser] = React.useState(null);
  const [checking, setChecking] = React.useState(true);

  React.useEffect(()=>{
    supabase.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    supabase.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
  },[]);
  React.useEffect(()=>{window.location.hash=page;},[page]);

  function handleLogin(u){setUser(u);setPage(CONFIG.ADMIN_EMAILS.includes(u.email)?"admin":"painel");}
  async function handleLogout(){await supabase.auth.signOut();setUser(null);setPage("login");}

  if(checking) return <Spinner/>;
  if(page==="cadastro") return <PageCadastro onNavigate={setPage}/>;
  if(page==="login") return <PageLogin onLogin={handleLogin} onNavigate={setPage}/>;
  if(page==="painel") return user?<PagePainel user={user} onLogout={handleLogout}/>:<PageLogin onLogin={handleLogin} onNavigate={setPage}/>;
  if(page==="admin") return user?<PageAdmin user={user} onLogout={handleLogout}/>:<PageLogin onLogin={handleLogin} onNavigate={setPage}/>;
  return <PageCadastro onNavigate={setPage}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
